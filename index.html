<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" id="theme-meta" content="#6366f1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Kalorie"/>
<meta name="application-name" content="Kalorie"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title>Kalorie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;font-family:system-ui,-apple-system,sans-serif}
button,input,select,textarea{font-family:inherit}
button:active{opacity:.82}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
textarea{resize:none}
input[type=number]::-webkit-inner-spin-button{opacity:1}

:root{
  --bg:#f1f5f9;--card:#fff;--surface:#f1f5f9;--border:#e2e8f0;
  --text:#1e293b;--muted:#6b7280;--track:#e2e8f0;
  --sheet-radius:20px 20px 0 0;
  --fab-bottom:24px;
  --top-safe:env(safe-area-inset-top,0px);
  --bot-safe:env(safe-area-inset-bottom,0px);
}
/* Status bar kompenzace ve standalone PWA */
@media all and (display-mode: standalone){
  body{ padding-top:var(--top-safe); }
  .sticky-header{ top:var(--top-safe) !important; }
}
.dark{--bg:#0a0f1e;--card:#0f172a;--surface:#1e293b;--border:#1e293b;--text:#f1f5f9;--muted:#64748b;--track:#1e293b}

body{background:var(--bg);color:var(--text);transition:background .3s,color .3s}

/* ── Tabs ── */
.tab-btn{padding:13px 15px;border:none;background:transparent;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}

/* ── Cards & inputs ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.inp{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:11px 13px;outline:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:#6366f1}
.inp::placeholder{color:var(--muted)}
.btn-pri{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;padding:13px;width:100%;transition:opacity .2s}
.btn-pri:disabled{opacity:.4;cursor:not-allowed}
.prog-bar{background:var(--track);border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}

/* ── Modal / sheet ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.sheet{
  width:100%;max-width:640px;
  background:var(--card);
  border-radius:var(--sheet-radius);
  border:1px solid var(--border);
  padding:20px 20px max(20px, calc(env(safe-area-inset-bottom) + 20px));
  /* Klíčové: výška = viewport mínus klávesnice */
  height:90dvh;
  max-height:90dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
/* Scrollovatelná část uvnitř sheetu */
.sheet-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-right:2px}
/* Fixní zápatí sheetu */
.sheet-footer{flex-shrink:0;padding-top:12px;border-top:1px solid var(--border);margin-top:8px}

/* ── Entry ── */
.entry{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:8px;animation:slideUp .22s ease}

/* ── Slot & mode buttons ── */
.slot-btn{padding:5px 11px;border-radius:99px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s}
.slot-btn.active{border-color:#6366f1;color:#6366f1;font-weight:700}
.mode-tab{flex:1;padding:8px 4px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-weight:500;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
.mode-tab.active{background:#6366f1;color:#fff;font-weight:700}
.tempo-btn{flex:1;padding:9px 4px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:11px;text-align:center;line-height:1.5;transition:all .2s}
.tempo-btn.active{border-color:#f59e0b;background:rgba(245,158,11,.08);color:#92400e}
.dark .tempo-btn.active{color:#fbbf24}
.gender-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:14px;transition:all .2s}
.gender-btn.active{border-color:#6366f1;color:#6366f1}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scanline{0%{transform:translateY(-50px);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateY(50px);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}
/* ── Responzivní layout ── */

/* Mobil (default) - bottom sheet */
.fab{position:fixed;bottom:var(--fab-bottom);right:20px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:28px;line-height:1;border:none;box-shadow:0 6px 20px rgba(99,102,241,.5);z-index:200;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Landscape na mobilu */
@media (orientation:landscape) and (max-height:500px){
  .sheet{height:100dvh;max-height:100dvh;border-radius:0;padding:12px 16px}
  .sticky-header .tab-btn{padding:8px 12px;font-size:12px}
}
/* Tablet (768px+) - sheet se centruje a má border radius všude */
@media (min-width:768px){
  :root{--sheet-radius:16px;--fab-bottom:32px}
  .modal-overlay{align-items:center}
  .sheet{height:auto;max-height:85vh;border-radius:16px;max-width:560px}
  .tab-btn{font-size:14px;padding:14px 18px}
  .mode-tab{font-size:13px}
}

/* Desktop (1024px+) */
@media (min-width:1024px){
  :root{--fab-bottom:40px}
  .sheet{max-width:600px;max-height:80vh}
  .modal-overlay{align-items:center}
  body{font-size:15px}
  .inp{font-size:15px}
  .tab-btn{font-size:15px;padding:15px 20px}
}

/* Keyboard open fix - když je klávesnice otevřená zmenší viewport */
@media (max-height:600px) and (max-width:768px){
  .sheet{height:100dvh;max-height:100dvh;border-radius:0}
  :root{--sheet-radius:0}
}

/* Safe area pro notch a home indicator */
.fab{padding-bottom:0;bottom:max(var(--fab-bottom),calc(env(safe-area-inset-bottom) + 16px));right:max(20px,calc(env(safe-area-inset-right) + 16px))}
input:focus,textarea:focus{scroll-margin-bottom:120px}
</style>
</head>
<body>
<!-- Splash screen -->
<div id="splash" style="position:fixed;inset:0;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s">
  <div style="font-size:72px;margin-bottom:16px">🍽</div>
  <div style="color:#fff;font-size:24px;font-weight:800;letter-spacing:1px">Kalorie AI</div>
  <div style="color:rgba(255,255,255,.7);font-size:14px;margin-top:8px">Načítám databázi…</div>
</div>
<div id="app"></div>

<!-- ── SCANNER ── -->
<div id="scanner" style="display:none;position:fixed;inset:0;z-index:500;background:#000;flex-direction:column">
  <div style="position:relative;flex:1;overflow:hidden">
    <video id="scan-vid" muted playsinline style="width:100%;height:100%;object-fit:cover"></video>
    <canvas id="scan-canvas" style="display:none"></canvas>
    <div style="position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;pointer-events:none">
      <div style="position:relative;width:280px;height:150px;box-shadow:0 0 0 9999px rgba(0,0,0,.5);border-radius:12px">
        <div style="position:absolute;top:0;left:0;width:28px;height:28px;border-top:3px solid #6366f1;border-left:3px solid #6366f1;border-radius:8px 0 0 0"></div>
        <div style="position:absolute;top:0;right:0;width:28px;height:28px;border-top:3px solid #6366f1;border-right:3px solid #6366f1;border-radius:0 8px 0 0"></div>
        <div style="position:absolute;bottom:0;left:0;width:28px;height:28px;border-bottom:3px solid #6366f1;border-left:3px solid #6366f1;border-radius:0 0 0 8px"></div>
        <div style="position:absolute;bottom:0;right:0;width:28px;height:28px;border-bottom:3px solid #6366f1;border-right:3px solid #6366f1;border-radius:0 0 8px 0"></div>
        <div style="position:absolute;left:4px;right:4px;top:50%;height:2px;background:linear-gradient(90deg,transparent,#6366f1,#8b5cf6,transparent);animation:scanline 1.8s ease-in-out infinite"></div>
      </div>
    </div>
    <div id="scan-status" style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:28px 20px 16px;text-align:center;font-size:14px;font-weight:600;color:#fff">Načítám kameru…</div>
  </div>
  <div style="background:#0a0f1e;padding:12px 20px 28px">
    <button onclick="closeScanner()" style="width:100%;padding:14px;background:#1e293b;border:1px solid #334155;border-radius:14px;color:#94a3b8;font-size:15px;cursor:pointer">✕ Zavřít kameru</button>
  </div>
</div>

<!-- ── CONFIRM MODAL ── -->
<div id="modal" style="display:none" class="modal-overlay" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()" style="text-align:center">
    <div id="modal-msg" style="color:var(--text);margin-bottom:20px;font-size:15px;line-height:1.5"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="modalYes()" style="background:#ef4444;color:#fff;border:none;border-radius:10px;padding:10px 22px;font-weight:700;cursor:pointer;font-size:14px">Smazat</button>
      <button onclick="closeModal()" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 22px;font-weight:600;cursor:pointer;font-size:14px">Zrušit</button>
    </div>
  </div>
</div>

<!-- ── ADD SHEET ── -->
<div id="add-sheet" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeAdd()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0">
      <div style="font-size:16px;font-weight:700;color:var(--text)">Přidat jídlo</div>
      <button onclick="closeAdd()" style="background:var(--surface);border:none;border-radius:8px;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 10px">×</button>
    </div>
    <div id="slot-row" style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;flex-shrink:0"></div>
    <div style="display:flex;gap:0;margin-bottom:12px;background:var(--surface);border-radius:10px;padding:3px;flex-shrink:0">
      <button class="mode-tab active" id="tab-manual" onclick="setMode('manual')">✏️ Ručně</button>
      <button class="mode-tab" id="tab-ai" onclick="setMode('ai')">🤖 AI</button>
      <button class="mode-tab" id="tab-ean" onclick="setMode('ean')">📷 Sken</button>
      <button class="mode-tab" id="tab-saved" onclick="setMode('saved')">⭐ Moje</button>
    </div>
    <div class="sheet-body">

    <!-- AI -->
    <div id="panel-ai" style="display:none">
      <!-- Photo upload area -->
      <div id="ai-photo-area" style="margin-bottom:10px;border:2px dashed var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:border-color .2s" onclick="document.getElementById('ai-photo-inp').click()" ondragover="event.preventDefault();this.style.borderColor='#6366f1'" ondragleave="this.style.borderColor=''" ondrop="event.preventDefault();handlePhotoDrop(event)">
        <input type="file" id="ai-photo-inp" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoSelect(this)"/>
        <div id="ai-photo-preview" style="display:none;margin-bottom:8px">
          <img id="ai-photo-img" style="max-height:120px;border-radius:8px;max-width:100%"/>
          <button onclick="event.stopPropagation();clearPhoto()" style="display:block;margin:6px auto 0;background:transparent;border:none;color:#ef4444;font-size:12px;cursor:pointer">× Odebrat foto</button>
        </div>
        <div id="ai-photo-placeholder">
          <div style="font-size:28px;margin-bottom:4px">📸</div>
          <div style="font-size:13px;color:var(--muted)">Vyfotit nebo nahrát jídlo</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">AI odhadne kalorie z fotky</div>
        </div>
      </div>
      <textarea id="ai-input" class="inp" rows="2" placeholder='nebo popiš: „150g ovesné kaše s banánem"…' style="margin-bottom:10px;line-height:1.5" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleAI()}"></textarea>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <label style="font-size:12px;color:var(--muted);white-space:nowrap">Porce (g):</label>
        <input class="inp" type="number" id="ai-g" value="100" min="1" style="width:80px" onchange="" />
      </div>
      <button class="btn-pri" id="ai-btn" onclick="handleAI()">🤖 Analyzovat přes Gemini</button>
    </div>

    <!-- Manual -->
    <div id="panel-manual">
      <div style="position:relative;margin-bottom:8px">
        <input class="inp" id="m-name" placeholder="Název jídla (zkus 'banán', 'kuřecí prsa'…)" oninput="onManualInput()" onkeydown="onManualKey(event)" autocomplete="off"/>
        <div id="m-suggest" style="display:none;position:absolute;left:0;right:0;top:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:999;max-height:200px;overflow-y:auto;margin-top:3px"></div>
      </div>
      <div id="m-autofill-info" style="display:none;margin-bottom:8px;padding:6px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:12px;color:#16a34a"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;padding-left:2px">KALORIE (kcal) <span id="m-liquid-note" style="display:none;color:#3b82f6;font-size:10px">· 0 pro vodu</span></label>
          <input class="inp" type="number" id="m-kcal" placeholder="0"/>
        </div>
        <div>
          <label id="m-g-label" style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;padding-left:2px">GRAMY (g)</label>
          <input class="inp" type="number" id="m-g" placeholder="100" value="100" onchange="onManualGrams()" onblur="onManualGrams()"/>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px">
        <div>
          <label style="font-size:10px;font-weight:700;color:#3b82f6;display:block;margin-bottom:4px;white-space:nowrap">BÍLK.</label>
          <input class="inp" type="number" id="m-b" placeholder="0g"/>
        </div>
        <div>
          <label style="font-size:10px;font-weight:700;color:#f59e0b;display:block;margin-bottom:4px;white-space:nowrap">SACH.</label>
          <input class="inp" type="number" id="m-s" placeholder="0g"/>
        </div>
        <div>
          <label style="font-size:10px;font-weight:700;color:#10b981;display:block;margin-bottom:4px;white-space:nowrap">TUKY</label>
          <input class="inp" type="number" id="m-t" placeholder="0g"/>
        </div>
        <div>
          <label style="font-size:10px;font-weight:700;color:#8b5cf6;display:block;margin-bottom:4px;white-space:nowrap">VLÁKN.</label>
          <input class="inp" type="number" id="m-vl" placeholder="0g"/>
        </div>
      </div>
      <button class="btn-pri" onclick="handleManual()">✅ Přidat</button>
    </div>

    <!-- EAN -->
    <div id="panel-ean" style="display:none;flex-direction:column;gap:10px">
      <button onclick="openScanner()" style="padding:16px;background:var(--surface);border:2px solid #a5b4fc;border-radius:14px;color:#6366f1;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px">
        <span style="font-size:22px">📷</span> Otevřít kameru
      </button>
      <div style="text-align:center;font-size:12px;color:var(--muted)">nebo zadej EAN ručně</div>
      <div style="display:flex;gap:8px">
        <input class="inp" type="number" id="ean-inp" placeholder="EAN (např. 8594043721012)" onkeydown="if(event.key==='Enter')handleEan()"/>
        <button onclick="handleEan()" style="padding:11px 16px;background:#6366f1;border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;white-space:nowrap">Najít</button>
      </div>
      <div style="font-size:11px;color:var(--muted);text-align:center">Data z Open Food Facts · zdarma · bez API klíče</div>
    </div>

    <!-- Moje jídla -->
    <div id="panel-saved" style="display:none;flex-direction:column;gap:10px">
      <div id="saved-view-list"></div>
      <button onclick="showCreateFood()" style="padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer">+ Vytvořit nové jídlo</button>
    </div>

    <!-- Editor vlastního jídla (skrytý) -->
    <div id="panel-foodeditor" style="display:none;flex-direction:column;gap:0;height:100%">
      <!-- Hlavička - fixní -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-shrink:0">
        <span style="font-weight:700;font-size:15px" id="editor-title">Nové jídlo</span>
        <button onclick="closeEditor()" style="background:var(--surface);border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 10px;border-radius:8px">← Zpět</button>
      </div>
      <input id="food-editor-name" class="inp" placeholder="Název jídla (např. Guláš, Smoothie…)" style="margin-bottom:10px;flex-shrink:0"/>

      <!-- Scrollovatelný obsah -->
      <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:8px">
        <div style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.05em">SLOŽKY</div>
        <div id="editor-ingredients" style="display:flex;flex-direction:column;gap:6px"></div>

        <!-- Přidat surovinu -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px">
          <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px">PŘIDAT SUROVINU</div>
          <input id="editor-ing-name" class="inp" placeholder="Název suroviny…" oninput="onEditorIngInput()" onkeydown="onEditorIngKey(event)" autocomplete="off" style="margin-bottom:8px"/>
          <!-- suggest jako fixed overlay -->
          <div id="editor-ing-suggest" style="display:none;position:fixed;left:16px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:9999;max-height:200px;overflow-y:auto" onclick="event.stopPropagation()" onmousedown="event.stopPropagation()"></div>
          <div style="display:flex;gap:8px">
            <input id="editor-ing-g" class="inp" type="number" value="100" min="1" style="flex:1"/>
            <span style="display:flex;align-items:center;color:var(--muted);font-size:13px;flex-shrink:0">g/ml</span>
            <button onclick="addEditorIngredient()" style="padding:11px 20px;background:#6366f1;border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;font-size:18px;min-width:54px;flex-shrink:0">+</button>
          </div>
        </div>

        <div id="editor-totals" style="padding:10px 14px;background:var(--surface);border-radius:10px;font-size:13px;color:var(--muted);text-align:center;border:1px solid var(--border)">0 kcal</div>
      </div>

      <!-- Tlačítka - fixní dole -->
      <div style="display:flex;gap:8px;padding-top:10px;flex-shrink:0;border-top:1px solid var(--border)">
        <button onclick="saveFoodEditor()" style="flex:1;padding:13px 8px;background:linear-gradient(135deg,#0f766e,#0d9488);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:13px;cursor:pointer">💾 Uložit</button>
        <button onclick="saveFoodEditorAndAdd()" style="flex:1;padding:13px 8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:13px;cursor:pointer">✅ Přidat dnes</button>
      </div>
    </div>

    </div><!-- /sheet-body -->
    <div class="sheet-footer">
      <div id="add-err" style="display:none;padding:8px 12px;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;color:#ef4444;font-size:13px;margin-bottom:6px"></div>
      <div id="add-ok" style="display:none;padding:8px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;color:#16a34a;font-size:13px"></div>
    </div>
  </div>

function normKey(s){
  return s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g,"").trim();
}
function lookupLocal(q){
  const k = normKey(q);
  if(FOOD_DB[k]) return FOOD_DB[k];
  // Částečná shoda
  const found = Object.entries(FOOD_DB).find(([key]) => key.includes(k));
  return found ? found[1] : null;
}

}

function calcBMR(v,h,a,g){
  return g==="muz" ? 10*v+6.25*h-5*a+5 : 10*v+6.25*h-5*a-161;
}
function targets(){
  const p = profile;
  const bmr  = Math.round(calcBMR(p.vaha,p.vyska,p.vek,p.pohlavi));
  const tdee = Math.round(bmr * p.aktivita);
  const hubnuti = p.cilVaha > 0 && p.cilVaha < p.vaha;
  const deficit  = hubnuti ? Math.round((p.tempo||0.5)*7700/7) : 0;
  const cilKcal  = hubnuti ? Math.max(tdee-deficit, p.pohlavi==="muz"?1500:1200) : tdee;
  const tydny    = hubnuti ? Math.ceil((p.vaha-p.cilVaha)/(p.tempo||0.5)) : 0;
  const datumCil = tydny>0 ? new Date(Date.now()+tydny*7*86400000).toLocaleDateString("cs-CZ") : null;
  return { bmr, tdee, cilKcal, deficit, hubnuti, tydny, datumCil,
    protein:   p.macroBilk!=null ? p.macroBilk : Math.round(p.vaha*2.0),
    tuky:      p.macroTuky!=null ? p.macroTuky : Math.round(cilKcal*0.28/9),
    sacharidy: p.macroSach!=null ? p.macroSach : Math.round(cilKcal*0.42/4),
    vlaknina:  p.macroVlak!=null ? p.macroVlak : 30,
    voda: p.vodaCil || Math.round(p.vaha*35) };
}
function totals(){
  return entries.reduce((a,e)=>({
    kcal: a.kcal+(e.kcal||0), b: a.b+(e.b||0), s: a.s+(e.s||0),
    t: a.t+(e.t||0), vl: a.vl+(e.vl||0),
    voda: a.voda+(e.isWater?e.porce_g:0)
  }),{kcal:0,b:0,s:0,t:0,vl:0,voda:0});
}

// ── Ring SVG ─────────────────────────────────────────────────────────────────
function ring(value, max, color, label, unit, big=false){
  const r=big?42:34, circ=2*Math.PI*r, pct=Math.min(value/(max||1),1), over=value>max;
  const col = over ? "#ef4444" : color;
  const rem = Math.max(Math.round(max-value),0);
  const sz = big?92:76;
  const valStr = big ? (value>=1000?Math.round(value/10)*10:Math.round(value)).toString() : Math.round(value).toString();
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <div style="position:relative;width:${sz}px;height:${sz}px">
      <svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--track)" stroke-width="${big?9:7}"/>
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${big?9:7}"
          stroke-dasharray="${pct*circ} ${circ}" stroke-linecap="round"
          style="transition:stroke-dasharray .5s ease"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <span style="font-size:${big?12:11}px;font-weight:800;color:${col}">${valStr}</span>
        <span style="font-size:${big?9:8}px;color:var(--muted)">${unit}</span>
      </div>
    </div>
    <span style="font-size:${big?10:9}px;font-weight:700;color:var(--muted)">${label}</span>
    <span style="font-size:9px;color:${over?"#ef4444":"#22c55e"}">${over?"+"+Math.round(value-max)+" přes":rem+" zbývá"}</span>
  </div>`;
}

function applyGram(id){
  const inp = document.getElementById("gram-inp-"+id);
  if(!inp) return;
  const newG = parseFloat(inp.value);
  if(!newG||newG<=0) return;
  entries = entries.map(e=>{
    if(e.id!==id) return e;
    const ratio = newG / (e.porce_g||100);
    return {...e,
      porce_g: Math.round(newG),
      kcal: (e.kcal||0)*ratio,
      b: (e.b||0)*ratio,
      s: (e.s||0)*ratio,
      t: (e.t||0)*ratio,
      vl: (e.vl||0)*ratio
    };
  });
  sv("ent_"+TODAY(), entries);
  render();
}

function removeIngFromEntry(entryId, ingIdx){
  entries = entries.map(e=>{
    if(e.id!==entryId) return e;
    const slozky = [...(e.slozky||[])];
    const removed = slozky.splice(ingIdx,1)[0];
    return {...e,
      slozky,
      kcal: Math.max(0,(e.kcal||0)-(removed.k||0)),
      b: Math.max(0,(e.b||0)-(removed.b||0)),
      s: Math.max(0,(e.s||0)-(removed.s||0)),
      t: Math.max(0,(e.t||0)-(removed.t||0)),
      vl: Math.max(0,(e.vl||0)-(removed.vl||0)),
      porce_g: Math.max(0,(e.porce_g||0)-(removed.g||0))
    };
  });
  sv("ent_"+TODAY(), entries);
  render();
}

// ── Inline ingredient suggest ─────────────────────────────────────────────────
let _inlineMatches = {};

function onInlineIngInput(inp, entryId){
  const q = normKey(inp.value);
  const sug = document.getElementById("inline-sug-"+entryId);
  if(!sug) return;
  if(q.length < 2){ sug.style.display="none"; return; }
  const matches = Object.entries(FOOD_DB).filter(([k])=>k.includes(q)).slice(0,8).map(([,e])=>e);
  _inlineMatches[entryId] = matches;
  if(!matches.length){ sug.style.display="none"; return; }
  sug.innerHTML = matches.map((e,i)=>`
    <div data-idx="${i}" data-eid="${entryId}"
      style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px"
      onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''">
      <span>${e[0]}</span>
      <span style="color:var(--muted);font-size:11px">${e[1]} kcal/100g</span>
    </div>`).join("");
  sug.querySelectorAll("[data-idx]").forEach(el=>{
    el.addEventListener("mousedown", ev=>{
      ev.preventDefault();
      ev.stopPropagation();
      const entry = (_inlineMatches[entryId]||[])[+el.dataset.idx];
      if(!entry) return;
      const nameInp = document.getElementById("add-ing-name-"+entryId);
      const gInp = document.getElementById("add-ing-g-"+entryId);
      if(nameInp) nameInp.value = entry[0];
      if(gInp) gInp.value = isLiquid(entry[0]) ? 250 : 100;
      sug.style.display="none";
    });
  });
  sug.style.display="block";
}

function hideInlineSug(entryId){
  const sug = document.getElementById("inline-sug-"+entryId);

function addIngToEntry(entryId){
  const nameEl = document.getElementById("add-ing-name-"+entryId);
  const gEl    = document.getElementById("add-ing-g-"+entryId);
  if(!nameEl||!gEl) return;
  const name = nameEl.value.trim();
  if(!name) return;
  const g = parseFloat(gEl.value)||100;
  const found = lookupLocal(name);
  const entry = found||[name,0,0,0,0,0];
  const r = g/100;
  const newIng = {id:Date.now()+Math.random(), j:entry[0]||name, g, k:entry[1]*r, b:entry[2]*r, s:entry[3]*r, t:entry[4]*r, vl:(entry[5]||0)*r};
  entries = entries.map(e=>{
    if(e.id!==entryId) return e;
    return {...e,
      slozky:[...(e.slozky||[]),newIng],
      kcal:(e.kcal||0)+newIng.k,
      b:(e.b||0)+newIng.b,
      s:(e.s||0)+newIng.s,
      t:(e.t||0)+newIng.t,
      vl:(e.vl||0)+newIng.vl,
      porce_g:(e.porce_g||0)+g
    };
  });
  sv("ent_"+TODAY(), entries);
  render();
}

async function testApiKey(){
  const inp = document.getElementById("gemini-key-inp");
  const key = inp ? inp.value.trim() : profile.geminiKey;
  const res_el = document.getElementById("api-test-result");
  if(!key || !res_el) return;
  res_el.style.display="block";
  res_el.style.background="#f8fafc";
  res_el.style.border="1px solid var(--border)";
  res_el.style.color="var(--muted)";
  res_el.textContent="⏳ Testuji připojení...";
  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
    const body = JSON.stringify({contents:[{parts:[{text:'{"jidlo":"test","kcal":0,"b":0,"s":0,"t":0,"g":100}'}]}]});
    let r;
    r = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open("POST", url);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.timeout = 10000;
      xhr.onload = () => resolve({ status: xhr.status, json: () => Promise.resolve(JSON.parse(xhr.responseText || "{}")) });
      xhr.onerror = () => reject(new Error("Síťová chyba"));
      xhr.ontimeout = () => reject(new Error("Timeout"));
      xhr.send(body);
    });
    const td = await r.json().catch(()=>({}));
    if(r.status===200 || r.status===400){
      res_el.style.background="#f0fdf4"; res_el.style.border="1px solid #bbf7d0"; res_el.style.color="#16a34a";
      res_el.textContent="✅ Připojení k Gemini funguje!";
    } else {
      res_el.style.background="#fef2f2"; res_el.style.border="1px solid #fca5a5"; res_el.style.color="#ef4444";
      res_el.textContent="❌ Chyba "+r.status+": "+(td?.error?.message||"Zkontroluj klíč");
    }
  } catch(e) {
    res_el.style.background="#fef9ec"; res_el.style.border="1px solid #fde68a"; res_el.style.color="#92400e";
    res_el.textContent="⚠️ Nelze se připojit k Gemini API. Zkontroluj internet.";
  }
}

// ── AI (Gemini) ───────────────────────────────────────────────────────────────
async function handleAI(){
  const txt = document.getElementById("ai-input").value.trim();
  if(!txt && !_photoBase64){ showErr("Zadej popis jídla nebo nahraj foto."); return; }
  const key = profile.geminiKey;
  if(!key){ showErr("Chybí Gemini API klíč. Nastav ho v Profilu → API klíč."); return; }

  const btn = document.getElementById("ai-btn");
  btn.disabled=true; btn.innerHTML='<span class="spin">⏳</span> Analyzuji…';
  clearMsg();

  try{
    const g = parseFloat(document.getElementById("ai-g").value)||100;
    const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

    // Build parts: optional image + text
    const parts = [];
    if(_photoBase64){
      parts.push({inline_data:{mime_type:_photoMime, data:_photoBase64}});
    }
    const textPrompt = GEMINI_PROMPT+"\n\n"+(txt ? "Jídlo/porce: "+txt : "Analyzuj jídlo na fotce")+(g!==100?" (porce "+g+"g)":"");
    parts.push({text: textPrompt});

    const body = JSON.stringify({contents:[{parts}]});

    // XMLHttpRequest - lépe funguje na Androidu/mobile
    const d = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open("POST", geminiUrl);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.timeout = 20000;
      xhr.onload = () => {
        try {
          const data = JSON.parse(xhr.responseText);
          if(xhr.status >= 400) reject(new Error(data?.error?.message || "HTTP "+xhr.status));
          else resolve(data);
        } catch(e) { reject(new Error("Chyba parsování odpovědi")); }
      };
      xhr.onerror = () => reject(new Error("Síťová chyba – zkontroluj internet a API klíč na aistudio.google.com/apikey"));
      xhr.ontimeout = () => reject(new Error("Vypršel časový limit – Gemini neodpovídá"));
      xhr.send(body);
    });
    const raw = (d.candidates?.[0]?.content?.parts?.[0]?.text||"").replace(/```json|```/g,"").trim();
    if(!raw) throw new Error("Prázdná odpověď od AI");
    const parsed = JSON.parse(raw);
    if(!parsed.jidlo||typeof parsed.kcal!=="number") throw new Error("Neplatná data z AI");
    addEntry({...parsed,porce_g:parsed.porce_g||g,source:"ai"});
    document.getElementById("ai-input").value="";
    clearPhoto();
    showOk(parsed.jidlo+" přidáno ("+Math.round(parsed.kcal)+" kcal)");
    setTimeout(closeAdd,1200);
  }catch(e){
    if(e.message.includes("Failed to fetch")){
      showErr("Nelze se připojit k Gemini. Zkontroluj: 1) API klíč v Profilu 2) Klíč začíná AIza... 3) Máš aktivní projekt na aistudio.google.com");
    } else if(e.message.includes("401")||e.message.includes("API_KEY")){
      showErr("Neplatný Gemini klíč. Zkontroluj klíč v Profilu → API klíč.");
    } else if(e.message.includes("quota")||e.message.includes("429")){
      showErr("Překročen limit Gemini. Počkej chvíli nebo zkus nový klíč.");
    } else {
      showErr("Chyba: "+e.message);
    }
    console.error(e);
  }
  btn.disabled=false; btn.innerHTML="🤖 Analyzovat přes Gemini";
}

// ── EAN / Open Food Facts ─────────────────────────────────────────────────────
async function handleEan(){
  const code = document.getElementById("ean-inp").value.trim();
  if(!code){ showErr("Zadej EAN kód."); return; }
  await lookupBarcode(code);
}

async function lookupBarcode(code){
  clearMsg();
  showOk("Hledám produkt…");
  try{
    const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const d = await r.json();
    if(d.status!==1) throw new Error("Produkt nenalezen v databázi");
    const p = d.product;
    const n = p.nutriments||{};
    const name = p.product_name_cs||p.product_name||p.brands||"Produkt "+code;
    const porce = parseFloat(p.serving_size)||100;
    addEntry({
      jidlo:name, porce_g:porce,
      kcal:(parseFloat(n["energy-kcal_100g"])||parseFloat(n["energy-kcal"])||0)*porce/100,
      b:(parseFloat(n.proteins_100g)||0)*porce/100,
      s:(parseFloat(n.carbohydrates_100g)||0)*porce/100,
      t:(parseFloat(n.fat_100g)||0)*porce/100,
      vl:(parseFloat(n.fiber_100g)||0)*porce/100,
      isWater:isLiquid(name), source:"barcode"
    });
    showOk(name+" přidáno!");
    setTimeout(closeAdd,1200);
  }catch(e){
    showErr(e.message||"Produkt nenalezen.");
  }
}

// ── Scanner (Quagga2) ─────────────────────────────────────────────────────────
function openScanner(){
  document.getElementById("scanner").style.display="flex";
  document.getElementById("scan-status").textContent="Načítám kameru…";
  startQuagga();
}

function closeScanner(){
  document.getElementById("scanner").style.display="none";
  try{ if(window.Quagga) Quagga.stop(); }catch(_){}
}

function startQuagga(){
  const loadLib = () => new Promise((res,rej)=>{
    if(window.Quagga){ res(); return; }
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js";
    s.onload=res; s.onerror=()=>rej(new Error("Nepodařilo se načíst scanner"));
    document.head.appendChild(s);
  });

  loadLib().then(()=>{
    Quagga.init({
      inputStream:{
        name:"Live", type:"LiveStream",
        target:document.getElementById("scan-vid"),
        constraints:{facingMode:"environment"},
      },
      decoder:{readers:["ean_reader","ean_8_reader","upc_reader","upc_e_reader","code_128_reader"]},
      locate:true,
    },(err)=>{
      if(err){
        document.getElementById("scan-status").textContent="Chyba kamery: "+err;
        return;
      }
      Quagga.start();
      document.getElementById("scan-status").textContent="Namiř na čárový kód…";
    });
    Quagga.onDetected((result)=>{
      const code=result.codeResult.code;
      if(code){
        Quagga.stop();
        closeScanner();
        openAdd();
        setMode("ean");
        lookupBarcode(code);
      }
    });
  }).catch(e=>{
    document.getElementById("scan-status").textContent="Chyba: "+e.message;
  });
}

function addRecipeItem(){

  const entry = found || [name, 0, 0, 0, 0, 0];

  recipe.push({ id:Date.now()+Math.random(), j:entry[0]||name, g, k:entry[1]*r, b:entry[2]*r, s:entry[3]*r, t:entry[4]*r, vl:entry[5]*r, isWater:isLiquid(name) });

function saveRecipe(){
  const nameEl = document.getElementById("rec-final-name");
  const slotEl = document.getElementById("rec-meal-sel");
  if(!nameEl||!slotEl) return;
  const name = nameEl.value.trim() || "Recept";
  const slot = slotEl.value;
  const tot = recipe.reduce((a,i)=>({k:a.k+i.k,b:a.b+i.b,s:a.s+i.s,t:a.t+i.t,vl:a.vl+i.vl,g:a.g+i.g,voda:a.voda+(i.isWater?i.g:0)}),{k:0,b:0,s:0,t:0,vl:0,g:0,voda:0});

  if(editId){
    // Nahraď existující
    entries = entries.map(e => e.id===editId ? {...tot, id:editId, jidlo:name, porce_g:Math.round(tot.g), slot:e.slot, isWater:tot.voda>0&&tot.k<10, source:"recept", slozky:[...recipe]} : e);
    editId=null; editMealKey=null;
  } else {
    addEntry({...tot, jidlo:name, porce_g:Math.round(tot.g), slot, isWater:tot.voda>0&&tot.k<10, source:"recept", slozky:[...recipe]});
  }
  // Ulož do "Moje jídla" pro budoucí použití
  const saved = ls("saved_foods", []);
  const newFood = {...tot, jidlo:name, porce_g:Math.round(tot.g), isWater:tot.voda>0&&tot.k<10, source:"recept", slozky:[...recipe]};
  if(!saved.find(s=>s.jidlo===name)){
    saved.push(newFood);
    sv("saved_foods", saved);
  }
  recipe=[];
  sv("ent_"+TODAY(), entries);
  setTab("dnes");
}

function startEdit(id){

  if(!item) return;
  editId = id;
  recipe = item.slozky ? [...item.slozky.map(i=>({...i,id:Date.now()+Math.random()}))] :

}

function calcActivityKcal(met, minutes){
  const w = profile.vaha || 80;
  // MET formula: kcal = MET × weight(kg) × time(h)
  return Math.round(met * w * (minutes/60));
}

// ── Push notifikace ───────────────────────────────────────────────────────────
let _notifScheduled = false;

async function requestNotifications(){
  if(!("Notification" in window)){ setToast("Prohlížeč nepodporuje notifikace"); return; }
  const perm = await Notification.requestPermission();
  if(perm==="granted"){
    updProf("notifEnabled", true);
    scheduleEveningNotif();
    setToast("🔔 Notifikace aktivovány!");
  } else {
    setToast("Notifikace zamítnuty v nastavení prohlížeče");
  }
}

function disableNotifications(){
  updProf("notifEnabled", false);
  setToast("🔕 Notifikace vypnuty");
}

function scheduleEveningNotif(){
  if(_notifScheduled) return;
  if(!profile.notifEnabled) return;
  if(Notification.permission!=="granted") return;
  _notifScheduled = true;
  const now = new Date();
  const target = new Date();
  target.setHours(20, 0, 0, 0); // 20:00
  if(target <= now) target.setDate(target.getDate()+1);
  const delay = target - now;
  setTimeout(()=>{
    _notifScheduled = false;
    const T = entries.reduce((a,e)=>({kcal:a.kcal+(e.kcal||0)}),{kcal:0});
    const tg = targets();
    const zbyvaCal = Math.round(tg.cilKcal - T.kcal);
    const msg = zbyvaCal > 0
      ? "Zbývá ti "+zbyvaCal+" kcal do denního cíle ("+Math.round(T.kcal)+"/"+tg.cilKcal+" kcal)"
      : "Denní cíl splněn! Celkem: "+Math.round(T.kcal)+" kcal 🎉";
    new Notification("🍽 Kalorie AI – denní přehled", { body: msg, icon: "icon.svg" });
    // reschedule for tomorrow
    setTimeout(()=>{ _notifScheduled=false; scheduleEveningNotif(); }, 1000);
  }, delay);
}

// Start notif scheduler if enabled
if(profile.notifEnabled && Notification.permission==="granted") scheduleEveningNotif();

// ── Auto-historie ────────────────────────────────────────────────────────────
function autoSaveHistory(){
  // Projdi všechny uložené dny v localStorage
  const today = TODAY();
  const keys = [];
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && k.startsWith("ent_") && k !== "ent_"+today) keys.push(k);
  }
  keys.forEach(k=>{
    const date = k.replace("ent_","");
    const dayEntries = ls(k, []);
    if(dayEntries.length > 0 && !hist[date]){
      hist[date] = dayEntries;
      sv("hist2", hist);
    }
  });
}

// Spusť auto-uložení při startu
autoSaveHistory();

// Automatické uložení každou minutu (zachytí půlnoc)
setInterval(()=>{
  const today = TODAY();
  // Pokud se změnil den, ulož předchozí den do historie
  if(window._lastDay && window._lastDay !== today){
    if(entries.length > 0){
      hist[window._lastDay] = entries;
      sv("hist2", hist);
      // Reset pro nový den
      entries = [];
      sv("ent_"+today, entries);
      render();
    }
  }
  window._lastDay = today;
}, 60000);
window._lastDay = TODAY();

// ── Start ─────────────────────────────────────────────────────────────────────
render();
