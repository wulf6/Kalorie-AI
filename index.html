<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" id="theme-meta" content="#6366f1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Kalorie"/>
<meta name="application-name" content="Kalorie"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title>Kalorie AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;font-family:system-ui,-apple-system,sans-serif}
button,input,select,textarea{font-family:inherit}
button:active{opacity:.82}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
textarea{resize:none}
input[type=number]::-webkit-inner-spin-button{opacity:1}

:root{
  --bg:#f1f5f9;--card:#fff;--surface:#f1f5f9;--border:#e2e8f0;
  --text:#1e293b;--muted:#6b7280;--track:#e2e8f0;
  --sheet-radius:20px 20px 0 0;
  --fab-bottom:24px;
  --top-safe:env(safe-area-inset-top,0px);
  --bot-safe:env(safe-area-inset-bottom,0px);
}
.dark{--bg:#0a0f1e;--card:#0f172a;--surface:#1e293b;--border:#1e293b;--text:#f1f5f9;--muted:#64748b;--track:#1e293b}

body{background:var(--bg);color:var(--text);transition:background .3s,color .3s}

.tab-btn{padding:13px 15px;border:none;background:transparent;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.inp{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:11px 13px;outline:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:#6366f1}
.inp::placeholder{color:var(--muted)}
.btn-pri{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;padding:13px;width:100%;transition:opacity .2s}
.btn-pri:disabled{opacity:.4;cursor:not-allowed}
.prog-bar{background:var(--track);border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.sheet{width:100%;max-width:640px;background:var(--card);border-radius:var(--sheet-radius);border:1px solid var(--border);padding:20px 20px max(20px, calc(env(safe-area-inset-bottom) + 20px));height:90dvh;max-height:90dvh;display:flex;flex-direction:column;overflow:hidden}
.sheet-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-right:2px}
.sheet-footer{flex-shrink:0;padding-top:12px;border-top:1px solid var(--border);margin-top:8px}
.entry{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:8px;animation:slideUp .22s ease}
.slot-btn{padding:5px 11px;border-radius:99px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s}
.slot-btn.active{border-color:#6366f1;color:#6366f1;font-weight:700}
.mode-tab{flex:1;padding:8px 4px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-weight:500;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
.mode-tab.active{background:#6366f1;color:#fff;font-weight:700}
.tempo-btn{flex:1;padding:9px 4px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:11px;text-align:center;line-height:1.5;transition:all .2s}
.tempo-btn.active{border-color:#f59e0b;background:rgba(245,158,11,.08);color:#92400e}
.dark .tempo-btn.active{color:#fbbf24}
.gender-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:14px;transition:all .2s}
.gender-btn.active{border-color:#6366f1;color:#6366f1}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scanline{0%{transform:translateY(-50px);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateY(50px);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}
.fab{position:fixed;bottom:var(--fab-bottom);right:20px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:28px;line-height:1;border:none;box-shadow:0 6px 20px rgba(99,102,241,.5);z-index:200;cursor:pointer;display:flex;align-items:center;justify-content:center}
@media (orientation:landscape) and (max-height:500px){ .sheet{height:100dvh;max-height:100dvh;border-radius:0;padding:12px 16px} .sticky-header .tab-btn{padding:8px 12px;font-size:12px} }
@media (min-width:768px){ :root{--sheet-radius:16px;--fab-bottom:32px} .modal-overlay{align-items:center} .sheet{height:auto;max-height:85vh;border-radius:16px;max-width:560px} .tab-btn{font-size:14px;padding:14px 18px} .mode-tab{font-size:13px} }
@media (min-width:1024px){ :root{--fab-bottom:40px} .sheet{max-width:600px;max-height:80vh} .modal-overlay{align-items:center} body{font-size:15px} .inp{font-size:15px} .tab-btn{font-size:15px;padding:15px 20px} }
@media (max-height:600px) and (max-width:768px){ .sheet{height:100dvh;max-height:100dvh;border-radius:0} :root{--sheet-radius:0} }
.fab{padding-bottom:0;bottom:max(var(--fab-bottom),calc(env(safe-area-inset-bottom) + 16px));right:max(20px,calc(env(safe-area-inset-right) + 16px))}
input:focus,textarea:focus{scroll-margin-bottom:120px}
.macro-detail-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.macro-detail-card{background:var(--card);border-radius:24px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;border:1px solid var(--border)}
</style>
</head>
<body>
<div id="splash" style="position:fixed;inset:0;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s">
  <div style="font-size:72px;margin-bottom:16px">🍽</div>
  <div style="color:#fff;font-size:24px;font-weight:800;letter-spacing:1px">Kalorie AI</div>
  <div style="color:rgba(255,255,255,.7);font-size:14px;margin-top:8px">Načítám databázi…</div>
</div>
<div id="app"></div>

<div id="scanner" style="display:none;position:fixed;inset:0;z-index:500;background:#000;flex-direction:column">
  <div style="position:relative;flex:1;overflow:hidden">
    <video id="scan-vid" muted playsinline style="width:100%;height:100%;object-fit:cover"></video>
    <canvas id="scan-canvas" style="display:none"></canvas>
    <div style="position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;pointer-events:none">
      <div style="position:relative;width:280px;height:150px;box-shadow:0 0 0 9999px rgba(0,0,0,.5);border-radius:12px">
        <div style="position:absolute;top:0;left:0;width:28px;height:28px;border-top:3px solid #6366f1;border-left:3px solid #6366f1;border-radius:8px 0 0 0"></div>
        <div style="position:absolute;top:0;right:0;width:28px;height:28px;border-top:3px solid #6366f1;border-right:3px solid #6366f1;border-radius:0 8px 0 0"></div>
        <div style="position:absolute;bottom:0;left:0;width:28px;height:28px;border-bottom:3px solid #6366f1;border-left:3px solid #6366f1;border-radius:0 0 0 8px"></div>
        <div style="position:absolute;bottom:0;right:0;width:28px;height:28px;border-bottom:3px solid #6366f1;border-right:3px solid #6366f1;border-radius:0 0 8px 0"></div>
        <div style="position:absolute;left:4px;right:4px;top:50%;height:2px;background:linear-gradient(90deg,transparent,#6366f1,#8b5cf6,transparent);animation:scanline 1.8s ease-in-out infinite"></div>
      </div>
    </div>
    <div id="scan-status" style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:28px 20px 16px;text-align:center;font-size:14px;font-weight:600;color:#fff">Načítám kameru…</div>
  </div>
  <div style="background:#0a0f1e;padding:12px 20px 28px;display:flex;flex-direction:column;gap:10px">
    <button id="scan-fallback-btn" onclick="document.getElementById('scan-file-inp').click()" style="width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:none">📸 Vyfotit čárový kód</button>
    <input type="file" id="scan-file-inp" accept="image/*" capture="environment" style="display:none" onchange="handleScanFile(this)"/>
    <button onclick="closeScanner()" style="width:100%;padding:14px;background:#1e293b;border:1px solid #334155;border-radius:14px;color:#94a3b8;font-size:15px;cursor:pointer">✕ Zavřít</button>
  </div>
</div>

<div id="modal" style="display:none" class="modal-overlay" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()" style="text-align:center">
    <div id="modal-msg" style="color:var(--text);margin-bottom:20px;font-size:15px;line-height:1.5"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="modalYes()" style="background:#ef4444;color:#fff;border:none;border-radius:10px;padding:10px 22px;font-weight:700;cursor:pointer;font-size:14px">Smazat</button>
      <button onclick="closeModal()" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 22px;font-weight:600;cursor:pointer;font-size:14px">Zrušit</button>
    </div>
  </div>
</div>

<div id="add-sheet" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeAdd()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0">
      <div style="font-size:16px;font-weight:700;color:var(--text)">Přidat jídlo</div>
      <button onclick="closeAdd()" style="background:var(--surface);border:none;border-radius:8px;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 10px">×</button>
    </div>
    <div id="slot-row" style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;flex-shrink:0"></div>
    <div style="display:flex;gap:0;margin-bottom:12px;background:var(--surface);border-radius:10px;padding:3px;flex-shrink:0">
      <button class="mode-tab active" id="tab-manual" onclick="setMode('manual')">✏️ Ručně</button>
      <button class="mode-tab" id="tab-ai" onclick="setMode('ai')">🤖 AI</button>
      <button class="mode-tab" id="tab-ean" onclick="setMode('ean')">📷 Sken</button>
      <button class="mode-tab" id="tab-saved" onclick="setMode('saved')">⭐ Moje</button>
    </div>
    <div class="sheet-body">
    <div id="panel-ai" style="display:none">
      <div id="ai-photo-area" style="margin-bottom:10px;border:2px dashed var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:border-color .2s" onclick="document.getElementById('ai-photo-inp').click()" ondragover="event.preventDefault();this.style.borderColor='#6366f1'" ondragleave="this.style.borderColor=''" ondrop="event.preventDefault();handlePhotoDrop(event)">
        <input type="file" id="ai-photo-inp" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoSelect(this)"/>
        <div id="ai-photo-preview" style="display:none;margin-bottom:8px">
          <img id="ai-photo-img" style="max-height:120px;border-radius:8px;max-width:100%"/>
          <button onclick="event.stopPropagation();clearPhoto()" style="display:block;margin:6px auto 0;background:transparent;border:none;color:#ef4444;font-size:12px;cursor:pointer">× Odebrat foto</button>
        </div>
        <div id="ai-photo-placeholder">
          <div style="font-size:28px;margin-bottom:4px">📸</div>
          <div style="font-size:13px;color:var(--muted)">Vyfotit nebo nahrát jídlo</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">AI odhadne kalorie z fotky</div>
        </div>
      </div>
      <textarea id="ai-input" class="inp" rows="2" placeholder='nebo popiš: „150g ovesné kaše s banánem"…' style="margin-bottom:10px;line-height:1.5" oninput="onAiInput()" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleAI()}"></textarea>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <label style="font-size:12px;color:var(--muted);white-space:nowrap">Porce (g):</label>
        <input class="inp" type="number" id="ai-g" value="100" min="1" style="width:80px"/>
      </div>
      <button class="btn-pri" id="ai-btn" onclick="handleAI()">🤖 Analyzovat přes Gemini</button>
    </div>
    <div id="panel-manual">
      <div style="position:relative;margin-bottom:8px">
        <input class="inp" id="m-name" placeholder="Název jídla (zkus 'banán', 'kuřecí prsa'…)" oninput="onManualInput()" onkeydown="onManualKey(event)" autocomplete="off"/>
        <div id="m-suggest" style="display:none;position:absolute;left:0;right:0;top:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:999;max-height:200px;overflow-y:auto;margin-top:3px"></div>
      </div>
      <div id="m-autofill-info" style="display:none;margin-bottom:8px;padding:6px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:12px;color:#16a34a"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;padding-left:2px">KALORIE (kcal)</label>
          <input class="inp" type="number" id="m-kcal" placeholder="0"/>
        </div>
        <div>
          <label id="m-g-label" style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;padding-left:2px">GRAMY (g)</label>
          <input class="inp" type="number" id="m-g" placeholder="100" value="100" onchange="onManualGrams()"/>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px">
        <div><label style="font-size:10px;font-weight:700;color:#3b82f6">BÍLK.</label><input class="inp" type="number" id="m-b" placeholder="0"/></div>
        <div><label style="font-size:10px;font-weight:700;color:#f59e0b">SACH.</label><input class="inp" type="number" id="m-s" placeholder="0"/></div>
        <div><label style="font-size:10px;font-weight:700;color:#10b981">TUKY</label><input class="inp" type="number" id="m-t" placeholder="0"/></div>
        <div><label style="font-size:10px;font-weight:700;color:#8b5cf6">VLÁKN.</label><input class="inp" type="number" id="m-vl" placeholder="0"/></div>
      </div>
      <button class="btn-pri" onclick="handleManual()">✅ Přidat</button>
    </div>
    <div id="panel-ean" style="display:none;flex-direction:column;gap:10px">
      <button onclick="openScanner()" style="padding:16px;background:var(--surface);border:2px solid #a5b4fc;border-radius:14px;color:#6366f1;font-weight:700;font-size:15px;cursor:pointer"><span style="font-size:22px">📷</span> Otevřít kameru</button>
      <div style="text-align:center;font-size:12px;color:var(--muted)">nebo zadej EAN ručně</div>
      <div style="display:flex;gap:8px"><input class="inp" type="text" id="ean-inp" placeholder="EAN (např. 8594043721012)" onkeydown="if(event.key==='Enter')handleEan()"/><button onclick="handleEan()" style="padding:11px 16px;background:#6366f1;border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer">Najít</button></div>
      <div style="font-size:11px;color:var(--muted);text-align:center">Data z Open Food Facts</div>
    </div>
    <div id="panel-saved" style="display:none;flex-direction:column;gap:10px"><div id="saved-view-list"></div><button onclick="showCreateFood()" style="padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-weight:700">+ Vytvořit nové jídlo</button></div>
    <div id="panel-foodeditor" style="display:none;flex-direction:column;gap:0;height:100%">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px;flex-shrink:0"><span style="font-weight:700" id="editor-title">Nové jídlo</span><button onclick="closeEditor()" style="background:var(--surface);border:none;color:var(--muted);padding:4px 10px;border-radius:8px">← Zpět</button></div>
      <input id="food-editor-name" class="inp" placeholder="Název jídla" style="margin-bottom:10px;flex-shrink:0"/>
      <div style="flex:1;overflow-y:auto">
        <div id="editor-ingredients" style="display:flex;flex-direction:column;gap:6px"></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:8px">
          <div style="font-size:11px;font-weight:600;margin-bottom:8px">PŘIDAT SUROVINU</div>
          <input id="editor-ing-name" class="inp" placeholder="Název suroviny…" oninput="onEditorIngInput()" style="margin-bottom:8px"/>
          <div style="display:flex;gap:8px"><input id="editor-ing-g" class="inp" type="number" value="100" style="flex:1"/><span style="display:flex;align-items:center;color:var(--muted)">g</span><button onclick="addEditorIngredient()" style="padding:11px 20px;background:#6366f1;border:none;border-radius:10px;color:#fff;font-weight:700">+</button></div>
        </div>
        <div id="editor-totals" style="margin-top:8px;padding:10px;background:var(--surface);border-radius:10px;text-align:center">0 kcal</div>
      </div>
      <div style="display:flex;gap:8px;padding-top:10px;flex-shrink:0"><button onclick="saveFoodEditor()" style="flex:1;padding:12px;background:#0f766e;border:none;border-radius:12px;color:#fff;font-weight:700">💾 Uložit</button><button onclick="saveFoodEditorAndAdd()" style="flex:1;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-weight:700">✅ Přidat dnes</button></div>
    </div>
    </div>
    <div class="sheet-footer"><div id="add-err" style="display:none;padding:8px;background:#fef2f2;border-radius:8px;color:#ef4444;margin-bottom:6px"></div><div id="add-ok" style="display:none;padding:8px;background:#f0fdf4;border-radius:8px;color:#16a34a"></div></div>
  </div>
</div>

<div id="macro-detail-modal" style="display:none" class="macro-detail-modal" onclick="closeMacroDetail()">
  <div class="macro-detail-card" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span id="macro-detail-title" style="font-size:18px;font-weight:800">Bílkoviny</span>
      <button onclick="closeMacroDetail()" style="background:var(--surface);border:none;border-radius:8px;padding:4px 12px;font-size:18px;cursor:pointer">×</button>
    </div>
    <div id="macro-detail-list" style="max-height:60vh;overflow-y:auto"></div>
    <div id="macro-detail-total" style="margin-top:16px;padding-top:12px;border-top:2px solid var(--border);font-weight:700;text-align:right"></div>
  </div>
</div>

<script>
// ======================== TYPICKÉ GRAMÁŽE (ROZŠÍŘENÉ) ========================
const TYPICAL_G = {
  "rohlik":43,"rohlík":43,"houska":50,"chleb":50,"chléb":50,"bageta":60,"toust":30,"toast":30,"kaiserka":50,"croissant":50,"donut":60,"perník<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#f1f5f9;--card:#fff;--surface:#f1f5f9;--border:#e2e8f0;
  --text:#1e293b;--muted:#6b7280;--track:#e2e8f0;
  --sheet-radius:20px 20px 0 0;
  --fab-bottom:24px;
  --top-safe:env(safe-area-inset-top,0px);
  --bot-safe:env(safe-area-inset-bottom,0px);
  --fs-xs:10px;--fs-sm:12px;--fs-base:14px;--fs-md:15px;--fs-lg:16px;--fs-xl:18px;--fs-xxl:24px;
}
@media all and (display-mode: standalone){
  body{ padding-top:var(--top-safe); }
  .sticky-header{ top:var(--top-safe) !important; }
}
.dark{--bg:#0a0f1e;--card:#0f172a;--surface:#1e293b;--border:#1e293b;--text:#f1f5f9;--muted:#64748b;--track:#1e293b}

body{background:var(--bg);color:var(--text);transition:background .3s,color .3s}

.tab-btn{padding:13px 15px;border:none;background:transparent;font-size:var(--fs-sm);font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}

.card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.inp{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:var(--fs-base);padding:11px 13px;outline:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:#6366f1}
.inp::placeholder{color:var(--muted)}
.btn-pri{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:var(--fs-base);font-weight:700;cursor:pointer;padding:13px;width:100%;transition:opacity .2s}
.btn-pri:disabled{opacity:.4;cursor:not-allowed}
.prog-bar{background:var(--track);border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.sheet{
  width:100%;max-width:640px;
  background:var(--card);
  border-radius:var(--sheet-radius);
  border:1px solid var(--border);
  padding:20px 20px max(20px, calc(env(safe-area-inset-bottom) + 20px));
  height:90dvh;
  max-height:90dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.sheet-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-right:2px}
.sheet-footer{flex-shrink:0;padding-top:12px;border-top:1px solid var(--border);margin-top:8px}

.entry{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:8px;animation:slideUp .22s ease}

.slot-btn{padding:5px 11px;border-radius:99px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s}
.slot-btn.active{border-color:#6366f1;color:#6366f1;font-weight:700}
.mode-tab{flex:1;padding:8px 4px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-weight:500;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
.mode-tab.active{background:#6366f1;color:#fff;font-weight:700}
.tempo-btn{flex:1;padding:9px 4px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:11px;text-align:center;line-height:1.5;transition:all .2s}
.tempo-btn.active{border-color:#f59e0b;background:rgba(245,158,11,.08);color:#92400e}
.dark .tempo-btn.active{color:#fbbf24}
.gender-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:14px;transition:all .2s}
.gender-btn.active{border-color:#6366f1;color:#6366f1}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scanline{0%{transform:translateY(-50px);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateY(50px);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}

.fab{position:fixed;bottom:var(--fab-bottom);right:20px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:28px;line-height:1;border:none;box-shadow:0 6px 20px rgba(99,102,241,.5);z-index:200;cursor:pointer;display:flex;align-items:center;justify-content:center}

@media (orientation:landscape) and (max-height:500px){
  .sheet{height:100dvh;max-height:100dvh;border-radius:0;padding:12px 16px}
  .sticky-header .tab-btn{padding:8px 12px;font-size:12px}
}
@media (min-width:768px){

  .mode-tab{font-size:13px}
}
@media (min-width:1024px){

}

}

.fab{padding-bottom:0;bottom:max(var(--fab-bottom),calc(env(safe-area-inset-bottom) + 16px));right:max(20px,calc(env(safe-area-inset-right) + 16px))}
input:focus,textarea:focus{scroll-margin-bottom:120px}
.macro-detail-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}

</style>

function getTypicalGrams(name){
  if(!name) return 100;
  const normalized = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  let bestMatch = null, bestLength = 0;
  for(let key in TYPICAL_G){
    if(normalized.includes(key) && key.length > bestLength){
      bestLength = key.length;
      bestMatch = TYPICAL_G[key];
    }
  }
  return bestMatch !== null ? bestMatch : 100;
}

async function loadFoodDB(){
  const splashStatus = document.getElementById("splash-status");
  const CACHE_KEY = "food_db_cache_v10";
  const CACHE_TIME_KEY = "food_db_cache_time_v10";
  const GITHUB_RAW = "https://raw.githubusercontent.com/wulf6/Kalorie/main/db.json";

  ["food_db_cache_v8","food_db_cache_v9","food_db_cache_time_v8","food_db_cache_time_v9"]
    .forEach(k=>{ try{localStorage.removeItem(k);}catch(_){} });

  try {
    const cached = localStorage.getItem(CACHE_KEY);
    const cacheTime = localStorage.getItem(CACHE_TIME_KEY);
    if(cached && cacheTime && (Date.now()-parseInt(cacheTime)) < 24*60*60*1000){
      Object.assign(FOOD_DB, JSON.parse(cached));
      if(splashStatus) splashStatus.textContent = Object.keys(FOOD_DB).length+" položek z cache";
      return;
    }
  } catch(_){}

  async function fetchCSV(){
    try {
      const r = await fetch("db.json?v="+Date.now(), {cache:"no-cache"});
      if(r.ok){ const t=await r.text(); if(t.length>500&&t.includes(",")) return t; }
    } catch(_){}
    const r2 = await fetch(GITHUB_RAW+"?v="+Date.now(), {cache:"no-cache"});
    if(!r2.ok) throw new Error("GitHub HTTP "+r2.status);
    return r2.text();
  }

  try {
    if(splashStatus) splashStatus.textContent = "stahuji databázi…";
    const text = await fetchCSV();
    const newDB = parseCSVtoDB(text);
    const count = Object.keys(newDB).length;
    if(count > 10){
      Object.assign(FOOD_DB, newDB);
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(newDB));
        localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
      } catch(_){}

function parseCSVtoDB(text){
  const lines = text.split(/\r?\n/);
  if(!lines.length) return {};
  const rawHeader = lines[0].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const headers = rawHeader.split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  const idx = {
    nazev: headers.findIndex(h=>h==="nazev"||h==="name"),
    kcal:  headers.findIndex(h=>h==="kcal"||h==="energie"),
    bilk:  headers.findIndex(h=>h.startsWith("bilk")||h.startsWith("prot")||h==="b"),
    sach:  headers.findIndex(h=>h.startsWith("sach")||h.startsWith("carb")||h==="s"),
    tuky:  headers.findIndex(h=>h.startsWith("tuk")||h.startsWith("fat")||h==="t"),
    vlak:  headers.findIndex(h=>h.startsWith("vlak")||h.startsWith("fib")||h==="vl"),
  };
  if(idx.nazev===-1){ console.warn("CSV: chybí sloupec nazev. Hlavička:", headers); return {}; }
  const db = {};
  for(let i=1; i<lines.length; i++){
    const line = lines[i].trim(); if(!line) continue;
    const vals=[]; let cur="",inQ=false;
    for(let j=0;j<line.length;j++){
      const c=line[j];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){vals.push(cur.trim().replace(/^"|"$/g,""));cur="";}
      else{cur+=c;}
    }
    vals.push(cur.trim().replace(/^"|"$/g,""));
    const nazev=vals[idx.nazev]||""; if(!nazev) continue;
    const kcal=idx.kcal>=0?parseFloat(vals[idx.kcal])||0:0;
    const b=idx.bilk>=0?parseFloat(vals[idx.bilk])||0:0;
    const s=idx.sach>=0?parseFloat(vals[idx.sach])||0:0;
    const t=idx.tuky>=0?parseFloat(vals[idx.tuky])||0:0;
    const vl=idx.vlak>=0?parseFloat(vals[idx.vlak])||0:0;
    if(kcal===0&&b===0&&s===0&&t===0) continue;
    const key=nazev.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,"");
    if(key) db[key]=[nazev,kcal,b,s,t,vl];
  }
  return db;
}

function isLiquid(name){
  const k = normKey(name);
  if(FOOD_NOT_DRINK.some(w => k.includes(w))) return false;
  return WATER_WORDS.some(w => normKey(w) && k.includes(normKey(w)));
}


function normKey(s){
  return s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g,"").trim();
}
function lookupLocal(q){
  const k = normKey(q);
  if(!k) return null;
  if(FOOD_DB[k]) return FOOD_DB[k];
  const startMatch = Object.entries(FOOD_DB).find(([key]) => key.startsWith(k));
  if(startMatch) return startMatch[1];
  const found = Object.entries(FOOD_DB).find(([key]) => key.includes(k));
  return found ? found[1] : null;
}
function makeEntry(entry, grams){
  const [name,k100,b100,s100,t100,vl100] = entry;
  const g = parseFloat(grams)||100, r=g/100;
  return {jidlo:name, porce_g:g, kcal:k100*r, b:b100*r, s:s100*r, t:t100*r, vl:vl100*r, source:"ai"};
}

function calcBMR(v,h,a,g){
  return g==="muz" ? 10*v+6.25*h-5*a+5 : 10*v+6.25*h-5*a-161;
}
function targets(){
  const p = profile;
  const bmr  = Math.round(calcBMR(p.vaha,p.vyska,p.vek,p.pohlavi));
  const tdee = Math.round(bmr * p.aktivita);
  const hubnuti = p.cilVaha > 0 && p.cilVaha < p.vaha;
  const deficit  = hubnuti ? Math.round((p.tempo||0.5)*7700/7) : 0;
  const cilKcal  = hubnuti ? Math.max(tdee-deficit, p.pohlavi==="muz"?1500:1200) : tdee;
  const tydny    = hubnuti ? Math.ceil((p.vaha-p.cilVaha)/(p.tempo||0.5)) : 0;
  const datumCil = tydny>0 ? new Date(Date.now()+tydny*7*86400000).toLocaleDateString("cs-CZ") : null;
  return { bmr, tdee, cilKcal, deficit, hubnuti, tydny, datumCil,
    protein:   p.macroBilk!=null ? p.macroBilk : Math.round(p.vaha*2.0),
    tuky:      p.macroTuky!=null ? p.macroTuky : Math.round(cilKcal*0.28/9),
    sacharidy: p.macroSach!=null ? p.macroSach : Math.round(cilKcal*0.42/4),
    vlaknina:  p.macroVlak!=null ? p.macroVlak : 30,
    voda: p.vodaCil || Math.round(p.vaha*35) };
}

}

function ring(value, max, color, label, unit, big=false){
  const r=big?42:34, circ=2*Math.PI*r, pct=Math.min(value/(max||1),1), over=value>max;
  const col = over ? "#ef4444" : color;
  const rem = Math.max(Math.round(max-value),0);
  const sz = big?92:76;
  const valStr = big ? (value>=1000?Math.round(value/10)*10:Math.round(value)).toString() : Math.round(value).toString();
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <div style="position:relative;width:${sz}px;height:${sz}px">
      <svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--track)" stroke-width="${big?9:7}"/>
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${big?9:7}"
          stroke-dasharray="${pct*circ} ${circ}" stroke-linecap="round"
          style="transition:stroke-dasharray .5s ease"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <span style="font-size:${big?12:11}px;font-weight:800;color:${col}">${valStr}</span>
        <span style="font-size:${big?9:8}px;color:var(--muted)">${unit}</span>
      </div>
    </div>
    <span style="font-size:${big?10:9}px;font-weight:700;color:var(--muted)">${label}</span>
    <span style="font-size:9px;color:${over?"#ef4444":"#22c55e"}">${over?"+"+Math.round(value-max)+" přes":rem+" zbývá"}</span>
  </div>`;
}

function applyGram(id){
  const inp = document.getElementById("gram-inp-"+id);
  if(!inp) return;
  const newG = parseFloat(inp.value);
  if(!newG||newG<=0) return;
  entries = entries.map(e=>{
    if(e.id!==id) return e;
    const ratio = newG / (e.porce_g||100);
    return {...e, porce_g:Math.round(newG), kcal:(e.kcal||0)*ratio, b:(e.b||0)*ratio, s:(e.s||0)*ratio, t:(e.t||0)*ratio, vl:(e.vl||0)*ratio, _t:Date.now()};
  });
  sv("ent_"+TODAY(), entries);
  render();
  syncWithServer({});
}

function removeIngFromEntry(entryId, ingIdx){
  entries = entries.map(e=>{
    if(e.id!==entryId) return e;
    const slozky = [...(e.slozky||[])];
    const removed = slozky.splice(ingIdx,1)[0];
    return {...e, slozky, kcal:Math.max(0,(e.kcal||0)-(removed.k||0)), b:Math.max(0,(e.b||0)-(removed.b||0)), s:Math.max(0,(e.s||0)-(removed.s||0)), t:Math.max(0,(e.t||0)-(removed.t||0)), vl:Math.max(0,(e.vl||0)-(removed.vl||0)), porce_g:Math.max(0,(e.porce_g||0)-(removed.g||0))};
  });
  sv("ent_"+TODAY(), entries);
  render();
}

  if(q.length < 2){ hideGlobalSuggest(); return; }
  const matches = Object.entries(FOOD_DB).filter(([k])=>k.includes(q)).slice(0,8).map(([,e])=>e);
  showGlobalSuggest(inp, matches, (entry) => {
    const nameInp = document.getElementById("add-ing-name-"+entryId);
    const gInp = document.getElementById("add-ing-g-"+entryId);
    if(nameInp) nameInp.value = entry[0];
    if(gInp) gInp.value = getTypicalGrams(entry[0]);
    hideGlobalSuggest();
  });
}

function addIngToEntry(entryId){
  const nameEl = document.getElementById("add-ing-name-"+entryId);
  const gEl = document.getElementById("add-ing-g-"+entryId);
  if(!nameEl||!gEl) return;
  const name = nameEl.value.trim(); if(!name) return;
  const g = parseFloat(gEl.value)||100;
  const found = lookupLocal(name);
  const entry = found||[name,0,0,0,0,0];
  const r = g/100;
  const newIng = {id:Date.now()+Math.random(), j:entry[0]||name, g, k:entry[1]*r, b:entry[2]*r, s:entry[3]*r, t:entry[4]*r, vl:(entry[5]||0)*r};
  entries = entries.map(e=>{
    if(e.id!==entryId) return e;
    return {...e, slozky:[...(e.slozky||[]),newIng], kcal:(e.kcal||0)+newIng.k, b:(e.b||0)+newIng.b, s:(e.s||0)+newIng.s, t:(e.t||0)+newIng.t, vl:(e.vl||0)+newIng.vl, porce_g:(e.porce_g||0)+g};
  });
  sv("ent_"+TODAY(), entries);
  render();
}

const GEMINI_MODELS=["gemini-2.5-flash","gemini-1.5-flash","gemini-1.5-flash-8b"];
async function callGemini(key,prompt,imageBase64=null,imageMime="image/jpeg"){
  const parts=[]; if(imageBase64)parts.push({inline_data:{mime_type:imageMime,data:imageBase64}}); parts.push({text:prompt});
  const body={contents:[{parts}]}; let lastError=null;
  for(const model of GEMINI_MODELS){
    try{
      const proxyUrl=profile.proxyUrl; let resp;
      if(proxyUrl){resp=await fetch(proxyUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key,body,model})});}
      else{const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});}
      const data=await resp.json(); if(resp.status===200)return data;
      if(resp.status===404||(data?.error?.message||"").includes("not found"))continue;
      if((data?.error?.message||"").includes("quota")||(data?.error?.message||"").includes("limit: 0")||(data?.error?.message||"").includes("RESOURCE_EXHAUSTED"))continue;
      throw new Error(data?.error?.message||"HTTP "+resp.status);
    }catch(e){lastError=e;if(e.message.includes("model_not_found")||e.message.includes("404"))continue;throw e;}
  }
  throw lastError||new Error("Žádný Gemini model není dostupný");
}

async function handleAI(){
  const txt=document.getElementById("ai-input").value.trim(); if(!txt&&!_photoBase64){showErr("Zadej popis nebo foto.");return;}
  const key=profile.geminiKey; if(!key){showErr("Chybí Gemini API klíč.");return;}
  const btn=document.getElementById("ai-btn"); btn.disabled=true; btn.innerHTML='<span class="spin">⏳</span> Analyzuji…'; clearMsg();
  try{
    const g=parseFloat(document.getElementById("ai-g").value)||100;
    const textPrompt=GEMINI_PROMPT+"\n\n"+(txt?"Jídlo: "+txt:"Analyzuj jídlo na fotce")+(g!==100?" (porce "+g+"g)":"");
    const data=await callGemini(key,textPrompt,_photoBase64,_photoMime);
    const raw=(data.candidates?.[0]?.content?.parts?.[0]?.text||"").replace(/```json|```/g,"").trim();
    if(!raw)throw new Error("Prázdná odpověď");
    const parsed=JSON.parse(raw);
    if(!parsed.jidlo||typeof parsed.kcal!=="number")throw new Error("Neplatná data");
    addEntry({...parsed,porce_g:parsed.porce_g||g,source:"ai"});
    document.getElementById("ai-input").value=""; document.getElementById("ai-g").value="100"; clearPhoto(); hideGlobalSuggest();
    showOk(parsed.jidlo+" přidáno ("+Math.round(parsed.kcal)+" kcal)");
    setTimeout(closeAdd,1200);
  }catch(e){showErr("Chyba: "+e.message);}
  btn.disabled=false; btn.innerHTML="🤖 Analyzovat přes Gemini";
}

async function handleAiPhotoFromScan(base64Data){
  const key=profile.geminiKey; if(!key){document.getElementById("scan-status").innerHTML=`<span style="color:#fca5a5">Kód nerozpoznán</span>`;return;}
  try{
    const geminiUrl=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
    const base64Content=base64Data.split(',')[1];
    const body=JSON.stringify({contents:[{parts:[{inline_data:{mime_type:"image/jpeg",data:base64Content}},{text:GEMINI_PROMPT+"\n\nIdentifikuj produkt z obalu a odhadni nutriční hodnoty na 100g."}]}]});

}

async function handleScanFile(inp){
  const file=inp.files[0]; if(!file)return;
  document.getElementById("scanner").style.display="flex";
  const statusEl=document.getElementById("scan-status"); statusEl.textContent="Zpracovávám fotku…";
  const reader=new FileReader();
  reader.onload=async(e)=>{
    if("BarcodeDetector" in window){try{const img=new Image();img.src=e.target.result;await new Promise(res=>img.onload=res);const canvas=document.createElement("canvas");canvas.width=img.width;canvas.height=img.height;canvas.getContext("2d").drawImage(img,0,0);const detector=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128","code_39"]});const codes=await detector.detect(canvas);if(codes.length){if(document.getElementById("scanner").style.display!=="none")closeScanner();openAdd();setMode("ean");lookupBarcode(codes[0].rawValue);return;}}catch(_){}}
    try{
      if(!window.Quagga){await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
      Quagga.decodeSingle({src:e.target.result,numOfWorkers:0,inputStream:{size:1600},decoder:{readers:["ean_reader","ean_8_reader","upc_reader","upc_e_reader","code_128_reader"]},locate:true},(result)=>{
        if(result&&result.codeResult){if(document.getElementById("scanner").style.display!=="none")closeScanner();openAdd();setMode("ean");lookupBarcode(result.codeResult.code);}
        else{statusEl.innerHTML=`<span style="color:#fca5a5">Kód nerozpoznán</span>`;handleAiPhotoFromScan(e.target.result);}
      });
    }catch(err){statusEl.textContent="Chyba: "+err.message;handleAiPhotoFromScan(e.target.result);}
  };
  reader.readAsDataURL(file);
}

async function searchOpenFoodFacts(query){
  try {
    const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&lc=cs&cc=cz&page_size=5`;
    const r = await fetch(url);
    if(!r.ok) return [];
    const data = await r.json();
    return (data.products||[])
      .filter(p => p.nutriments && p.product_name)
      .map(p => {
        const n = p.nutriments;
        const name = p.product_name_cs || p.product_name || query;
        const kcal = Math.round(n["energy-kcal_100g"] || (n["energy_100g"]||0)/4.184 || 0);
        const b = parseFloat((n.proteins_100g||0).toFixed(1));
        const s = parseFloat((n.carbohydrates_100g||0).toFixed(1));
        const t = parseFloat((n.fat_100g||0).toFixed(1));
        const vl = parseFloat((n.fiber_100g||0).toFixed(1));
        if(!kcal && !b && !s && !t) return null;
        return [name, kcal, b, s, t, vl, "off"]; // "off" = Open Food Facts
      })
      .filter(Boolean);
  } catch(e) {
    console.warn("OFF chyba:", e.message);
    return [];
  }
}

function dbKey(s){ if(!s)return""; return s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,""); }
function searchDB(q,limit=10){ if(!q||q.length<1)return[]; const needle=dbKey(q);if(!needle)return[]; const starts=[],contains=[]; for(const[key,val]of Object.entries(FOOD_DB)){if(key.startsWith(needle))starts.push(val);else if(key.includes(needle))contains.push(val);if(starts.length+contains.length>=limit*2)break;} return[...starts,...contains].slice(0,limit); }

function getDeviceId(){ let id=localStorage.getItem("device_id");if(!id){id=crypto.randomUUID();localStorage.setItem("device_id",id);}return id; }
const DEVICE_ID = getDeviceId();
let syncTimeout = null;

async function syncWithServer(push={}, _retry=false){
  const backendUrl = BACKEND_URL;
  const username = (localStorage.getItem("_sync_username") || profile.syncUsername || "").trim();
  if(!username){ return; }

  // Zobraz "probouzím server" pokud byl dlouho neaktivní
  const lastSync = ls("last_sync_time", 0);
  const wasAsleep = (Date.now() - lastSync) > 10 * 60 * 1000; // 10 minut
  if(wasAsleep && !_retry) setToast("⏳ Probouzím server…");
  else if(!_retry) setToast("🔄 Synchronizuji…");

  try{
    const today = TODAY();
    // Vždy pošli aktuální lokální jídla - backend merguje
    const body = {
      device_id: DEVICE_ID,
      username: username,
      profile: {...profile, _profileTs: profile._profileTs || 0},
      entries: {[today]: entries},
      history: hist,
      receptar: ls("saved_foods",[]),
      aktivity: ls("act_log",[]),
      weight_log: ls("weight_log",[])
    };

    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 30000); // 30s timeout

    const resp = await fetch(backendUrl+"/sync", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body),
      signal: controller.signal
    });
    clearTimeout(timeout);

    if(!resp.ok) throw new Error("HTTP "+resp.status);
    const data = await resp.json();

    // Aplikuj profil ze serveru - server má přednost pro všechna data
    if(data.profile && Object.keys(data.profile).length > 0){
      const localUsername = localStorage.getItem("_sync_username") || profile.syncUsername || "";
      // Gemini klíč - vyhraje novější timestamp
      const localTs = profile.geminiKeyTs || 0;
      const serverTs = data.profile.geminiKeyTs || 0;
      const winningKey = serverTs >= localTs
        ? (data.profile.geminiKey || profile.geminiKey || "")
        : (profile.geminiKey || data.profile.geminiKey || "");
      const winningKeyTs = Math.max(localTs, serverTs);

      // Vezmi vše ze serveru, zachovej jen lokální sync nastavení a gemini klíč
      profile = {
        ...data.profile,
        geminiKey: winningKey,
        geminiKeyTs: winningKeyTs,
        backendUrl: BACKEND_URL,
        syncUsername: localUsername,
      };
      sv("prof2", profile);
      // Aplikuj font size ze serveru
      if(profile.fontSize) applyFontSize(profile.fontSize);
    }

    // Aplikuj historii - remote má přednost pro starší dny
    if(data.history){
      hist = {...hist, ...data.history}; // remote přepisuje lokální (správně!)
      sv("hist2", hist);
    }

    // Přijmi VŠECHNY záznamy pro dnešek ze serveru (merge)
    if(data.entries){
      const remoteToday = data.entries[today] || [];
      if(remoteToday.length > 0){
        const localIds = new Set(entries.map(e=>e.id));
        const newFromRemote = remoteToday.filter(e=>!localIds.has(e.id));
        if(newFromRemote.length){
          entries = [...entries, ...newFromRemote];
          sv("ent_"+today, entries);
        }
      }
    }

    // Přijmi nová uložená jídla
    if(data.receptar && data.receptar.length > 0){
      const localSaved = ls("saved_foods",[]);
      const localNames = new Set(localSaved.map(f=>f.jidlo));
      const newFoods = data.receptar.filter(f=>!localNames.has(f.jidlo));
      if(newFoods.length) sv("saved_foods",[...localSaved,...newFoods]);
    }

    // Vyčisti staré _del záznamy (starší než 24h) - nepotřebujeme je dál
    const oneDayAgo = Date.now() - 86400000;
    entries = entries.filter(e => !e._del || (e._t||0) > oneDayAgo);
    sv("ent_" + today, entries);
    sv("last_sync_time", Date.now());
    // Vynutit znovu načtení profilu - resetuj inputy
    if(profTab === "zakladni" || profTab === "hubnuti"){
      profTab = profTab; // zachovej tab ale vynutí render
    }
    render(); // vždy překresli po syncu
    // Explicitně nastav hodnoty profil inputů (prohlížeč si pamatuje staré hodnoty)
    ["vyska","vaha","cilVaha","vek"].forEach(key=>{
      const el = document.getElementById("prof-inp-"+key);
      if(el) el.value = profile[key] || "";
    });
    // Aktualizuj všechny inputy v API sekci
    const _keyInp = document.getElementById("gemini-key-inp");
    if(_keyInp && profile.geminiKey) _keyInp.value = profile.geminiKey;
    const _proxyInp = document.getElementById("proxy-url-inp");
    if(_proxyInp) _proxyInp.value = profile.proxyUrl || "";
    const _syncUser = document.getElementById("sync-username");
    if(_syncUser) _syncUser.value = profile.syncUsername || "";
    const _syncBackend = document.getElementById("sync-backend-url");
    if(_syncBackend) _syncBackend.value = profile.backendUrl || "";
    const _vodaInp = document.querySelector("input[onblur*='vodaCil']");
    if(_vodaInp) _vodaInp.value = profile.vodaCil || Math.round((profile.vaha||80)*35);
    setSyncStatus("☁️ " + new Date().toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit"}) + " · " + entries.filter(e=>!e._del).length + " jídel · váha: " + profile.vaha + "kg");
  }catch(e){
    console.warn("Sync chyba:", e.message);
    if(e.name === "AbortError"){
      // Server se probouzel, zkus znovu po 5s
      if(!_retry){
        setToast("⏳ Server se probouzí, čekám…");
        setTimeout(()=>syncWithServer({}, true), 5000);
      } else {
        setToast("⚠️ Server nereaguje – zkus znovu");
      }
    } else {
      setToast("⚠️ Sync selhal: "+e.message);
    }
  }
}

async function doSync(){
  const username = (localStorage.getItem("_sync_username") || "").trim();
  if(!username) return;
  setSyncStatus("🔄 Synchronizuji…");

  const today = TODAY();

  try {
    // Krok 1: Stáhni ze serveru
    const getR = await fetch(BACKEND_URL + "/data/user_" + username.toLowerCase());
    if(!getR.ok) throw new Error("GET " + getR.status);
    const serverData = await getR.json();
    const serverToday = (serverData.entries || {})[today] || [];

    // Krok 2: Merge - vyhraj vždy záznam s novějším _t timestampem
    const localMap = new Map(entries.map(e => [String(e.id), e]));
    for(const se of serverToday){
      const key = String(se.id);
      const local = localMap.get(key);
      if(!local){
        // Nové jídlo ze serveru - přidej jen pokud není smazané lokálně
        localMap.set(key, se);
      } else {
        // Konflikt - vyhraj novější _t
        if((se._t||0) > (local._t||0)) localMap.set(key, se);
      }
    }
    const merged = Array.from(localMap.values());

    // Aktualizuj lokální pokud přišlo něco nového
    if(merged.length !== entries.length || merged.some((e,i)=>e._del!==entries[i]?._del)){
      entries = merged;
      sv("ent_" + today, entries);
    }

    // Krok 3: Pošli merged na server
    const postR = await fetch(BACKEND_URL + "/sync", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        device_id: DEVICE_ID,
        username: username,
        profile: profile,
        entries: {[today]: merged},
        history: hist,
        receptar: ls("saved_foods", [])
      })
    });

    if(!postR.ok) throw new Error("POST " + postR.status);
    const result = await postR.json();

    // Krok 4: Server vrátil finálně mergovaná data - použij je jako zdroj pravdy
    const resultToday = (result.entries || {})[today] || [];
    if(resultToday.length > 0){
      // Merge výsledku se serveru s lokálním - vyhraje vždy novější _t
      const finalMap = new Map(resultToday.map(e => [String(e.id), e]));
      for(const le of entries){
        const key = String(le.id);
        const srv = finalMap.get(key);
        if(!srv || (le._t||0) > (srv._t||0)){
          finalMap.set(key, le);
        }
      }
      entries = Array.from(finalMap.values());
      sv("ent_" + today, entries);
    }

    if(result.history){ hist = {...hist, ...result.history}; sv("hist2", hist); }
    // Aplikuj váhu
    if(result.weight_log && result.weight_log.length){
      const localW = ls("weight_log",[]);
      const localDates = new Set(localW.map(e=>e.d));
      const newW = result.weight_log.filter(e=>!localDates.has(e.d));
      if(newW.length) sv("weight_log",[...localW,...newW].sort((a,b)=>a.d.localeCompare(b.d)));
    }

    // Aplikuj aktivity
    if(result.aktivity && result.aktivity.length){
      const localActs = ls("act_log",[]);
      const localActIds = new Set(localActs.map(a=>String(a.id)));
      const newActs = result.aktivity.filter(a=>!localActIds.has(String(a.id)));
      if(newActs.length) sv("act_log",[...localActs,...newActs]);
    }

    if(result.receptar && result.receptar.length){
      const local = ls("saved_foods", []);
      const names = new Set(local.map(f => f.jidlo));
      const newF = result.receptar.filter(f => !names.has(f.jidlo));
      if(newF.length) sv("saved_foods", [...local, ...newF]);
    }

    sv("last_sync_time", Date.now());
    render();

  } catch(e) {
    console.warn("Sync chyba:", e.message);
    setSyncStatus("⚠️ " + e.message);
  }
}

// ── EAN Scanner ───────────────────────────────────────────────────────────────
let _scanStream=null;
async function openScanner(){
  const el=document.getElementById("scanner"); el.style.display="flex";
  const statusEl=document.getElementById("scan-status"); statusEl.textContent="Načítám kameru…";
  const fbBtn=document.getElementById("scan-fallback-btn");
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280}}});
    _scanStream=stream;
    const vid=document.getElementById("scan-vid"); vid.srcObject=stream; await vid.play();
    statusEl.textContent="Přiložte čárový kód ke kameře";
    fbBtn.style.display="none";
    if("BarcodeDetector" in window){ startBarcodeDetection(); }
    else { fbBtn.style.display="block"; statusEl.textContent="BarcodeDetector není podporován. Vyfotit kód."; }
  }catch(e){
    statusEl.textContent="Kamera nedostupná: "+e.message;
    fbBtn.style.display="block";
  }
}
function closeScanner(){ if(_scanStream){_scanStream.getTracks().forEach(t=>t.stop());_scanStream=null;} document.getElementById("scanner").style.display="none"; }
let _scanActive=false;
async function startBarcodeDetection(){
  if(_scanActive)return; _scanActive=true;
  const detector=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128"]});
  const vid=document.getElementById("scan-vid");
  while(_scanStream && vid.readyState>=2){
    try{
      const codes=await detector.detect(vid);
      if(codes.length){
        _scanActive=false;
        closeScanner(); openAdd(); setMode("ean");
        lookupBarcode(codes[0].rawValue);
        return;
      }
    }catch(_){}
    await new Promise(r=>setTimeout(r,300));
  }
  _scanActive=false;
}

async function handleEan(){
  const code=document.getElementById("ean-inp")?.value?.trim(); if(!code){showErr("Zadej EAN kód.");return;}
  lookupBarcode(code);
}

async function lookupBarcode(code){
  clearMsg();
  const statusEl=document.getElementById("add-err");
  try{
    showErr("Hledám produkt…");
    const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const d=await r.json();
    if(d.status!==1||!d.product){showErr("Produkt nenalezen (EAN: "+code+")");return;}
    const p=d.product; const n=p.nutriments||{};
    const kcal=Math.round(n["energy-kcal_100g"]||n["energy_100g"]/4.184||0);
    const b=parseFloat((n.proteins_100g||0).toFixed(1));
    const s=parseFloat((n.carbohydrates_100g||0).toFixed(1));
    const t=parseFloat((n.fat_100g||0).toFixed(1));
    const vl=parseFloat((n.fiber_100g||0).toFixed(1));
    const name=p.product_name||p.product_name_cs||p.product_name_en||"Produkt "+code;
    const servingG=parseFloat(p.serving_quantity)||100;
    clearMsg();
    document.getElementById("m-name").value=name;
    document.getElementById("m-kcal").value=Math.round(kcal*servingG/100);
    document.getElementById("m-g").value=servingG;
    document.getElementById("m-b").value=(b*servingG/100).toFixed(1);
    document.getElementById("m-s").value=(s*servingG/100).toFixed(1);
    document.getElementById("m-t").value=(t*servingG/100).toFixed(1);
    document.getElementById("m-vl").value=(vl*servingG/100).toFixed(1);
    setMode("manual");
    showOk("✓ "+name+" načteno z Open Food Facts");
  }catch(e){showErr("Chyba: "+e.message);}
}
