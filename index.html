<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" id="theme-meta" content="#6366f1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Kalorie"/>
<meta name="application-name" content="Kalorie"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title>Kalorie AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;font-family:system-ui,-apple-system,sans-serif}
button,input,select,textarea{font-family:inherit}
button:active{opacity:.82}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
textarea{resize:none}
input[type=number]::-webkit-inner-spin-button{opacity:1}

:root{
  --bg:#f1f5f9;--card:#fff;--surface:#f1f5f9;--border:#e2e8f0;
  --text:#1e293b;--muted:#6b7280;--track:#e2e8f0;
  --sheet-radius:20px 20px 0 0;
  --fab-bottom:24px;
  --top-safe:env(safe-area-inset-top,0px);
  --bot-safe:env(safe-area-inset-bottom,0px);
}
.dark{--bg:#0a0f1e;--card:#0f172a;--surface:#1e293b;--border:#1e293b;--text:#f1f5f9;--muted:#64748b;--track:#1e293b}

body{background:var(--bg);color:var(--text);transition:background .3s,color .3s}

.tab-btn{padding:13px 15px;border:none;background:transparent;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.inp{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:11px 13px;outline:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:#6366f1}
.inp::placeholder{color:var(--muted)}
.btn-pri{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;padding:13px;width:100%;transition:opacity .2s}
.btn-pri:disabled{opacity:.4;cursor:not-allowed}
.prog-bar{background:var(--track);border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.sheet{width:100%;max-width:640px;background:var(--card);border-radius:var(--sheet-radius);border:1px solid var(--border);padding:20px 20px max(20px, calc(env(safe-area-inset-bottom) + 20px));height:90dvh;max-height:90dvh;display:flex;flex-direction:column;overflow:hidden}
.sheet-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-right:2px}
.sheet-footer{flex-shrink:0;padding-top:12px;border-top:1px solid var(--border);margin-top:8px}
.entry{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:8px;animation:slideUp .22s ease}
.slot-btn{padding:5px 11px;border-radius:99px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s}
.slot-btn.active{border-color:#6366f1;color:#6366f1;font-weight:700}
.mode-tab{flex:1;padding:8px 4px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-weight:500;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
.mode-tab.active{background:#6366f1;color:#fff;font-weight:700}
.tempo-btn{flex:1;padding:9px 4px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:11px;text-align:center;line-height:1.5;transition:all .2s}
.tempo-btn.active{border-color:#f59e0b;background:rgba(245,158,11,.08);color:#92400e}
.dark .tempo-btn.active{color:#fbbf24}
.gender-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:14px;transition:all .2s}
.gender-btn.active{border-color:#6366f1;color:#6366f1}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scanline{0%{transform:translateY(-50px);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateY(50px);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}
.fab{position:fixed;bottom:var(--fab-bottom);right:20px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:28px;line-height:1;border:none;box-shadow:0 6px 20px rgba(99,102,241,.5);z-index:200;cursor:pointer;display:flex;align-items:center;justify-content:center}
@media (orientation:landscape) and (max-height:500px){ .sheet{height:100dvh;max-height:100dvh;border-radius:0;padding:12px 16px} .sticky-header .tab-btn{padding:8px 12px;font-size:12px} }
@media (min-width:768px){ :root{--sheet-radius:16px;--fab-bottom:32px} .modal-overlay{align-items:center} .sheet{height:auto;max-height:85vh;border-radius:16px;max-width:560px} .tab-btn{font-size:14px;padding:14px 18px} .mode-tab{font-size:13px} }
@media (min-width:1024px){ :root{--fab-bottom:40px} .sheet{max-width:600px;max-height:80vh} .modal-overlay{align-items:center} body{font-size:15px} .inp{font-size:15px} .tab-btn{font-size:15px;padding:15px 20px} }
@media (max-height:600px) and (max-width:768px){ .sheet{height:100dvh;max-height:100dvh;border-radius:0} :root{--sheet-radius:0} }
.fab{padding-bottom:0;bottom:max(var(--fab-bottom),calc(env(safe-area-inset-bottom) + 16px));right:max(20px,calc(env(safe-area-inset-right) + 16px))}
input:focus,textarea:focus{scroll-margin-bottom:120px}
.macro-detail-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.macro-detail-card{background:var(--card);border-radius:24px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;border:1px solid var(--border)}
</style>
</head>
<body>
<div id="splash" style="position:fixed;inset:0;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s">
  <div style="font-size:72px;margin-bottom:16px">🍽</div>
  <div style="color:#fff;font-size:24px;font-weight:800;letter-spacing:1px">Kalorie AI</div>
  <div style="color:rgba(255,255,255,.7);font-size:14px;margin-top:8px">Načítám databázi…</div>
</div>
<div id="app"></div>

<div id="scanner" style="display:none;position:fixed;inset:0;z-index:500;background:#000;flex-direction:column">
  <div style="position:relative;flex:1;overflow:hidden">
    <video id="scan-vid" muted playsinline style="width:100%;height:100%;object-fit:cover"></video>
    <canvas id="scan-canvas" style="display:none"></canvas>
    <div style="position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;pointer-events:none">
      <div style="position:relative;width:280px;height:150px;box-shadow:0 0 0 9999px rgba(0,0,0,.5);border-radius:12px">
        <div style="position:absolute;top:0;left:0;width:28px;height:28px;border-top:3px solid #6366f1;border-left:3px solid #6366f1;border-radius:8px 0 0 0"></div>
        <div style="position:absolute;top:0;right:0;width:28px;height:28px;border-top:3px solid #6366f1;border-right:3px solid #6366f1;border-radius:0 8px 0 0"></div>
        <div style="position:absolute;bottom:0;left:0;width:28px;height:28px;border-bottom:3px solid #6366f1;border-left:3px solid #6366f1;border-radius:0 0 0 8px"></div>
        <div style="position:absolute;bottom:0;right:0;width:28px;height:28px;border-bottom:3px solid #6366f1;border-right:3px solid #6366f1;border-radius:0 0 8px 0"></div>
        <div style="position:absolute;left:4px;right:4px;top:50%;height:2px;background:linear-gradient(90deg,transparent,#6366f1,#8b5cf6,transparent);animation:scanline 1.8s ease-in-out infinite"></div>
      </div>
    </div>
    <div id="scan-status" style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:28px 20px 16px;text-align:center;font-size:14px;font-weight:600;color:#fff">Načítám kameru…</div>
  </div>
  <div style="background:#0a0f1e;padding:12px 20px 28px;display:flex;flex-direction:column;gap:10px">
    <button id="scan-fallback-btn" onclick="document.getElementById('scan-file-inp').click()" style="width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:none">📸 Vyfotit čárový kód</button>
    <input type="file" id="scan-file-inp" accept="image/*" capture="environment" style="display:none" onchange="handleScanFile(this)"/>
    <button onclick="closeScanner()" style="width:100%;padding:14px;background:#1e293b;border:1px solid #334155;border-radius:14px;color:#94a3b8;font-size:15px;cursor:pointer">✕ Zavřít</button>
  </div>
</div>

<div id="modal" style="display:none" class="modal-overlay" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()" style="text-align:center">
    <div id="modal-msg" style="color:var(--text);margin-bottom:20px;font-size:15px;line-height:1.5"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="modalYes()" style="background:#ef4444;color:#fff;border:none;border-radius:10px;padding:10px 22px;font-weight:700;cursor:pointer;font-size:14px">Smazat</button>
      <button onclick="closeModal()" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 22px;font-weight:600;cursor:pointer;font-size:14px">Zrušit</button>
    </div>
  </div>
</div>

<div id="add-sheet" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeAdd()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0">
      <div style="font-size:16px;font-weight:700;color:var(--text)">Přidat jídlo</div>
      <button onclick="closeAdd()" style="background:var(--surface);border:none;border-radius:8px;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 10px">×</button>
    </div>
    <div id="slot-row" style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;flex-shrink:0"></div>
    <div style="display:flex;gap:0;margin-bottom:12px;background:var(--surface);border-radius:10px;padding:3px;flex-shrink:0">
      <button class="mode-tab active" id="tab-manual" onclick="setMode('manual')">✏️ Ručně</button>
      <button class="mode-tab" id="tab-ai" onclick="setMode('ai')">🤖 AI</button>
      <button class="mode-tab" id="tab-ean" onclick="setMode('ean')">📷 Sken</button>
      <button class="mode-tab" id="tab-saved" onclick="setMode('saved')">⭐ Moje</button>
    </div>
    <div class="sheet-body">
    <div id="panel-ai" style="display:none">
      <div id="ai-photo-area" style="margin-bottom:10px;border:2px dashed var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:border-color .2s" onclick="document.getElementById('ai-photo-inp').click()" ondragover="event.preventDefault();this.style.borderColor='#6366f1'" ondragleave="this.style.borderColor=''" ondrop="event.preventDefault();handlePhotoDrop(event)">
        <input type="file" id="ai-photo-inp" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoSelect(this)"/>
        <div id="ai-photo-preview" style="display:none;margin-bottom:8px">
          <img id="ai-photo-img" style="max-height:120px;border-radius:8px;max-width:100%"/>
          <button onclick="event.stopPropagation();clearPhoto()" style="display:block;margin:6px auto 0;background:transparent;border:none;color:#ef4444;font-size:12px;cursor:pointer">× Odebrat foto</button>
        </div>
        <div id="ai-photo-placeholder">
          <div style="font-size:28px;margin-bottom:4px">📸</div>
          <div style="font-size:13px;color:var(--muted)">Vyfotit nebo nahrát jídlo</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">AI odhadne kalorie z fotky</div>
        </div>
      </div>
      <textarea id="ai-input" class="inp" rows="2" placeholder='nebo popiš: „150g ovesné kaše s banánem"…' style="margin-bottom:10px;line-height:1.5" oninput="onAiInput()" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleAI()}"></textarea>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <label style="font-size:12px;color:var(--muted);white-space:nowrap">Porce (g):</label>
        <input class="inp" type="number" id="ai-g" value="100" min="1" style="width:80px"/>
      </div>
      <button class="btn-pri" id="ai-btn" onclick="handleAI()">🤖 Analyzovat přes Gemini</button>
    </div>
    <div id="panel-manual">
      <div style="position:relative;margin-bottom:8px">
        <input class="inp" id="m-name" placeholder="Název jídla (zkus 'banán', 'kuřecí prsa'…)" oninput="onManualInput()" onkeydown="onManualKey(event)" autocomplete="off"/>
        <div id="m-suggest" style="display:none;position:absolute;left:0;right:0;top:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:999;max-height:200px;overflow-y:auto;margin-top:3px"></div>
      </div>
      <div id="m-autofill-info" style="display:none;margin-bottom:8px;padding:6px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:12px;color:#16a34a"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;padding-left:2px">KALORIE (kcal)</label>
          <input class="inp" type="number" id="m-kcal" placeholder="0"/>
        </div>
        <div>
          <label id="m-g-label" style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;padding-left:2px">GRAMY (g)</label>
          <input class="inp" type="number" id="m-g" placeholder="100" value="100" onchange="onManualGrams()"/>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px">
        <div><label style="font-size:10px;font-weight:700;color:#3b82f6">BÍLK.</label><input class="inp" type="number" id="m-b" placeholder="0"/></div>
        <div><label style="font-size:10px;font-weight:700;color:#f59e0b">SACH.</label><input class="inp" type="number" id="m-s" placeholder="0"/></div>
        <div><label style="font-size:10px;font-weight:700;color:#10b981">TUKY</label><input class="inp" type="number" id="m-t" placeholder="0"/></div>
        <div><label style="font-size:10px;font-weight:700;color:#8b5cf6">VLÁKN.</label><input class="inp" type="number" id="m-vl" placeholder="0"/></div>
      </div>
      <button class="btn-pri" onclick="handleManual()">✅ Přidat</button>
    </div>
    <div id="panel-ean" style="display:none;flex-direction:column;gap:10px">
      <button onclick="openScanner()" style="padding:16px;background:var(--surface);border:2px solid #a5b4fc;border-radius:14px;color:#6366f1;font-weight:700;font-size:15px;cursor:pointer"><span style="font-size:22px">📷</span> Otevřít kameru</button>
      <div style="text-align:center;font-size:12px;color:var(--muted)">nebo zadej EAN ručně</div>
      <div style="display:flex;gap:8px"><input class="inp" type="text" id="ean-inp" placeholder="EAN (např. 8594043721012)" onkeydown="if(event.key==='Enter')handleEan()"/><button onclick="handleEan()" style="padding:11px 16px;background:#6366f1;border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer">Najít</button></div>
      <div style="font-size:11px;color:var(--muted);text-align:center">Data z Open Food Facts</div>
    </div>
    <div id="panel-saved" style="display:none;flex-direction:column;gap:10px"><div id="saved-view-list"></div><button onclick="showCreateFood()" style="padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-weight:700">+ Vytvořit nové jídlo</button></div>
    <div id="panel-foodeditor" style="display:none;flex-direction:column;gap:0;height:100%">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px;flex-shrink:0"><span style="font-weight:700" id="editor-title">Nové jídlo</span><button onclick="closeEditor()" style="background:var(--surface);border:none;color:var(--muted);padding:4px 10px;border-radius:8px">← Zpět</button></div>
      <input id="food-editor-name" class="inp" placeholder="Název jídla" style="margin-bottom:10px;flex-shrink:0"/>
      <div style="flex:1;overflow-y:auto">
        <div id="editor-ingredients" style="display:flex;flex-direction:column;gap:6px"></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:8px">
          <div style="font-size:11px;font-weight:600;margin-bottom:8px">PŘIDAT SUROVINU</div>
          <input id="editor-ing-name" class="inp" placeholder="Název suroviny…" oninput="onEditorIngInput()" style="margin-bottom:8px"/>
          <div style="display:flex;gap:8px"><input id="editor-ing-g" class="inp" type="number" value="100" style="flex:1"/><span style="display:flex;align-items:center;color:var(--muted)">g</span><button onclick="addEditorIngredient()" style="padding:11px 20px;background:#6366f1;border:none;border-radius:10px;color:#fff;font-weight:700">+</button></div>
        </div>
        <div id="editor-totals" style="margin-top:8px;padding:10px;background:var(--surface);border-radius:10px;text-align:center">0 kcal</div>
      </div>
      <div style="display:flex;gap:8px;padding-top:10px;flex-shrink:0"><button onclick="saveFoodEditor()" style="flex:1;padding:12px;background:#0f766e;border:none;border-radius:12px;color:#fff;font-weight:700">💾 Uložit</button><button onclick="saveFoodEditorAndAdd()" style="flex:1;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-weight:700">✅ Přidat dnes</button></div>
    </div>
    </div>
    <div class="sheet-footer"><div id="add-err" style="display:none;padding:8px;background:#fef2f2;border-radius:8px;color:#ef4444;margin-bottom:6px"></div><div id="add-ok" style="display:none;padding:8px;background:#f0fdf4;border-radius:8px;color:#16a34a"></div></div>
  </div>
</div>

<div id="macro-detail-modal" style="display:none" class="macro-detail-modal" onclick="closeMacroDetail()">
  <div class="macro-detail-card" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span id="macro-detail-title" style="font-size:18px;font-weight:800">Bílkoviny</span>
      <button onclick="closeMacroDetail()" style="background:var(--surface);border:none;border-radius:8px;padding:4px 12px;font-size:18px;cursor:pointer">×</button>
    </div>
    <div id="macro-detail-list" style="max-height:60vh;overflow-y:auto"></div>
    <div id="macro-detail-total" style="margin-top:16px;padding-top:12px;border-top:2px solid var(--border);font-weight:700;text-align:right"></div>
  </div>
</div>

<script>
// ======================== TYPICKÉ GRAMÁŽE (ROZŠÍŘENÉ) ========================
// Slovník klíčových slov a jejich typické porce (g/ml)
const TYPICAL_G = {
  // Pečivo
  "rohlik": 43, "rohlík": 43, "houska": 50, "chleb": 30, "chléb": 30, "bageta": 60, "toust": 30, "toast": 30,
  "kaiserka": 50, "croissant": 50, "donut": 60, "perník": 50,
  // Maso a uzeniny
  "sunka": 20, "šunka": 20, "sunka": 20, "šunka": 20, "salám": 30, "párek": 50, "klobása": 70,
  "kureci prsa": 150, "kuřecí prsa": 150, "kureci prso": 150, "kureci rizek": 150, "veprova": 150, "vepřová": 150,
  "vejce": 55, "vajíčko": 55, "vajicko": 55,
  // Mléčné výrobky
  "mleko": 250, "mléko": 250, "jogurt": 150, "tvaroh": 150, "syr": 30, "sýr": 30, "eidam": 30, "gouda": 30,
  "cottage": 150, "ricotta": 100, "mascarpone": 50, "smetana": 30,
  // Ovoce
  "banan": 118, "banán": 118, "jablko": 150, "pomeranc": 200, "pomeranč": 200, "mandarinka": 80, "hruška": 150,
  "jahoda": 100, "jahody": 100, "borůvka": 100, "borůvky": 100, "malina": 100, "maliny": 100, "višeň": 100,
  "třešeň": 100, "kiwi": 100, "mango": 150, "ananas": 100, "melon": 200,
  // Zelenina
  "mrkev": 80, "okurka": 100, "rajče": 100, "rajčata": 100, "paprika": 100, "brambory": 200, "brambor": 200,

// Rozšířená funkce pro získání typické gramáže podle názvu (částečná shoda)
function getTypicalGrams(name) {
  if (!name) return 100;
  const normalized = normKey(name);
  // 1. Přesná shoda
  if (TYPICAL_G[normalized]) return TYPICAL_G[normalized];
  // 2. Částečná shoda (nejdelší možná)
  let bestMatch = null;
  let bestLength = 0;
  for (let key in TYPICAL_G) {
    if (normalized.includes(key)) {
      if (key.length > bestLength) {
        bestLength = key.length;
        bestMatch = TYPICAL_G[key];
      }
    }
  }
  if (bestMatch) return bestMatch;
  // 3. Výchozí 100g
  return 100;
}

const FOOD_DB = {};

// Načtení databáze z GitHubu nebo použití vestavěné
async function loadFoodDB() {
  const dbUrl = "db.json";
  try {
    const cached = localStorage.getItem("food_db_cache");
    const cacheTime = localStorage.getItem("food_db_cache_time");
    const oneDay = 24 * 60 * 60 * 1000;
    if (cached && cacheTime && (Date.now() - parseInt(cacheTime)) < oneDay) {
      const data = JSON.parse(cached);
      Object.assign(FOOD_DB, data);
      console.log("✅ Databáze načtena z cache,", Object.keys(FOOD_DB).length, "položek");
      return;
    }
  } catch(e) {}
  try {
    const response = await fetch(dbUrl + "?t=" + Date.now());
    if (response.ok) {
      const data = await response.json();
      Object.assign(FOOD_DB, data);
      localStorage.setItem("food_db_cache", JSON.stringify(data));
      localStorage.setItem("food_db_cache_time", Date.now().toString());
      console.log("✅ Databáze načtena z GitHubu!", Object.keys(FOOD_DB).length, "položek");
      return;
    }
  } catch(e) {
    console.warn("❌ Nelze načíst db.json:", e.message);
  }
  // Fallback (základní položky)
  console.log("📦 Používám vestavěnou základní databázi");
  Object.assign(FOOD_DB, {
    "banan": ["Banán", 94, 1.2, 22, 0.2, 2],

    "chleb": ["Chléb kmínový", 244, 8, 45, 1.1, 4],

  localStorage.setItem("food_db_cache", JSON.stringify(FOOD_DB));
  localStorage.setItem("food_db_cache_time", Date.now().toString());

const WATER_WORDS=["voda","caj","kava","pivo","vino","mleko","cola","dzus","smoothie","džus"];
function isLiquid(name){ return WATER_WORDS.some(w=>normKey(name).includes(w)); }
function normKey(s){ return s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g,""); }
function lookupLocal(q){ const k=normKey(q); if(FOOD_DB[k]) return FOOD_DB[k]; const found=Object.entries(FOOD_DB).find(([key])=>key.includes(k)); return found?found[1]:null; }
function makeEntry(entry,grams){ const [name,k100,b100,s100,t100,vl100]=entry; const g=grams||100, r=g/100; return {jidlo:name,porce_g:g,kcal:k100*r,b:b100*r,s:s100*r,t:t100*r,vl:vl100*r,source:"ai"}; }

function calcBMR(v,h,a,g){ return g==="muz"?10*v+6.25*h-5*a+5:10*v+6.25*h-5*a-161; }
function targets(){ const p=profile; const bmr=Math.round(calcBMR(p.vaha,p.vyska,p.vek,p.pohlavi)); const tdee=Math.round(bmr*p.aktivita); const hubnuti=p.cilVaha>0&&p.cilVaha<p.vaha; const deficit=hubnuti?Math.round((p.tempo||0.5)*7700/7):0; const cilKcal=hubnuti?Math.max(tdee-deficit,1200):tdee; return {bmr,tdee,cilKcal,protein:p.macroBilk||Math.round(p.vaha*2),tuky:p.macroTuky||Math.round(cilKcal*0.28/9),sacharidy:p.macroSach||Math.round(cilKcal*0.42/4),vlaknina:p.macroVlak||30,voda:p.vodaCil||Math.round(p.vaha*35)}; }
function totals(){ return entries.reduce((a,e)=>({kcal:a.kcal+(e.kcal||0),b:a.b+(e.b||0),s:a.s+(e.s||0),t:a.t+(e.t||0),vl:a.vl+(e.vl||0),voda:a.voda+(e.isWater?e.porce_g:0)}),{kcal:0,b:0,s:0,t:0,vl:0,voda:0}); }

function ring(value,max,color,label,unit,type){
  if(max<=0) max=1;
  const pct=Math.min(value/max,1);
  const over=value>max;
  const col=over?"#ef4444":color;
  const sz=76, r=34, circ=2*Math.PI*r;
  const valStr=Math.round(value).toString();
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer" onclick="showMacroDetail('${label}','${type}')">
    <div style="position:relative;width:${sz}px;height:${sz}px">
      <svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--track)" stroke-width="7"/>
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="7" stroke-dasharray="${pct*circ} ${circ}" stroke-linecap="round"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <span style="font-size:13px;font-weight:800;color:${col}">${valStr}</span>
        <span style="font-size:9px;color:var(--muted)">${unit}</span>
      </div>
    </div>
    <span style="font-size:11px;font-weight:700;color:var(--muted)">${label}</span>
    <span style="font-size:9px;color:${over?"#ef4444":"#22c55e"}">${over?"+"+Math.round(value-max)+" přes":Math.round(max-value)+" zbývá"}</span>
  </div>`;
}

function showMacroDetail(label, type){
  const T = totals();
  let totalValue = 0;
  let items = [];
  switch(type){
    case 'protein': totalValue = T.b; items = entries.filter(e => (e.b||0) > 0).map(e => ({name:e.jidlo, value:e.b, unit:"g", slot:e.slot})); break;
    case 'carbs': totalValue = T.s; items = entries.filter(e => (e.s||0) > 0).map(e => ({name:e.jidlo, value:e.s, unit:"g", slot:e.slot})); break;
    case 'fat': totalValue = T.t; items = entries.filter(e => (e.t||0) > 0).map(e => ({name:e.jidlo, value:e.t, unit:"g", slot:e.slot})); break;
    case 'fiber': totalValue = T.vl; items = entries.filter(e => (e.vl||0) > 0).map(e => ({name:e.jidlo, value:e.vl, unit:"g", slot:e.slot})); break;
    default: return;
  }
  items.sort((a,b)=>b.value - a.value);
  const listHtml = items.length ? items.map(i => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div><span style="font-weight:600">${i.name}</span> <span style="color:var(--muted);font-size:11px">(${i.slot})</span></div><span style="font-weight:700">${i.value.toFixed(1)} ${i.unit}</span></div>`).join("") : '<div style="text-align:center;padding:20px;color:var(--muted)">Žádné záznamy pro dnešek</div>';
  const targetMap = {protein: targets().protein, carbs: targets().sacharidy, fat: targets().tuky, fiber: targets().vlaknina};
  document.getElementById("macro-detail-title").innerHTML = `${label} - Denní přehled`;
  document.getElementById("macro-detail-list").innerHTML = listHtml;
  document.getElementById("macro-detail-total").innerHTML = `Celkem: ${totalValue.toFixed(1)} g / ${targetMap[type] || 0} g`;

}

function toggleDark(){ dark=!dark; document.body.classList.toggle("dark",dark); sv("dark2",dark); render(); }
function addEntry(data){ entries=[...entries,{...data,id:Date.now(),slot:activeSlot}]; sv("ent_"+TODAY(),entries); render(); closeAdd(); }
function updProf(k,v){ profile={...profile,[k]:v}; sv("prof2",profile); render(); }
function confirmReset(){ showModal("Uložit do historie a začít nový den?",()=>{ if(entries.length) hist[TODAY()]=entries; entries=[]; sv("ent_"+TODAY(),entries); sv("hist2",hist); render(); }); }
function showModal(msg,cb){ document.getElementById("modal-msg").innerHTML=msg; document.getElementById("modal").style.display="flex"; modalCb=cb; }
function closeModal(){ document.getElementById("modal").style.display="none"; modalCb=null; }
function modalYes(){ if(modalCb)modalCb(); closeModal(); }
function openAdd(){ document.getElementById("add-sheet").style.display="flex"; renderSlots(); setMode(addMode); clearMsg(); }
function closeAdd(){ document.getElementById("add-sheet").style.display="none"; }
function renderSlots(){ document.getElementById("slot-row").innerHTML=SLOTS.map(s=>`<button class="slot-btn${s===activeSlot?" active":""}" onclick="setSlot('${s}')">${s}</button>`).join(""); }
function setSlot(s){ activeSlot=s; renderSlots(); }
function setMode(m){ addMode=m; ["ai","manual","ean","saved","foodeditor"].forEach(k=>{const p=document.getElementById("panel-"+k);if(p)p.style.display=k===m?"block":"none";}); if(m==="saved")renderSavedList(); }
function clearMsg(){ document.getElementById("add-err").style.display="none"; document.getElementById("add-ok").style.display="none"; }
function showErr(msg){ const e=document.getElementById("add-err"); e.textContent="⚠️ "+msg; e.style.display="block"; }
function showOk(msg){ const e=document.getElementById("add-ok"); e.textContent="✓ "+msg; e.style.display="block"; setTimeout(()=>e.style.display="none",1500); }

// Manual
let _manualEntry=null;
function onManualInput(){ const inp=document.getElementById("m-name"); const q=normKey(inp.value); if(q.length<2)return; const matches=Object.entries(FOOD_DB).filter(([k])=>k.includes(q)).slice(0,5); showSuggest(inp,matches,entry=>{ _manualEntry=entry; inp.value=entry[0]; hideSuggest(); const typicalG = getTypicalGrams(entry[0]); document.getElementById("m-g").value=typicalG; fillManualFromEntry(entry,typicalG); }); }
function fillManualFromEntry(entry,g){ const [name,k100,b100,s100,t100,vl100]=entry; const r=g/100; document.getElementById("m-kcal").value=Math.round(k100*r); document.getElementById("m-b").value=(b100*r).toFixed(1); document.getElementById("m-s").value=(s100*r).toFixed(1); document.getElementById("m-t").value=(t100*r).toFixed(1); document.getElementById("m-vl").value=(vl100*r).toFixed(1); document.getElementById("m-autofill-info").style.display="block"; }
function onManualGrams(){ if(_manualEntry) fillManualFromEntry(_manualEntry, parseFloat(document.getElementById("m-g").value)||100); }
function onManualKey(ev){ if(ev.key==="Escape")hideSuggest(); if(ev.key==="Enter"){ev.preventDefault();handleManual();} }
function handleManual(){ const name=document.getElementById("m-name").value.trim(); if(!name){showErr("Zadej název");return;} const g=parseFloat(document.getElementById("m-g").value)||100; const kcal=parseFloat(document.getElementById("m-kcal").value)||0; if(!kcal&&!isLiquid(name)){showErr("Zadej kalorie");return;} addEntry({jidlo:name,porce_g:g,kcal,b:parseFloat(document.getElementById("m-b").value)||0,s:parseFloat(document.getElementById("m-s").value)||0,t:parseFloat(document.getElementById("m-t").value)||0,vl:parseFloat(document.getElementById("m-vl").value)||0,isWater:isLiquid(name),source:"manual"}); closeAdd(); }

// AI
async function handleAI(){ const txt=document.getElementById("ai-input").value.trim(); if(!txt){showErr("Zadej popis");return;} const key=profile.geminiKey; if(!key){showErr("Chybí Gemini klíč v Profilu");return;} const btn=document.getElementById("ai-btn"); btn.disabled=true; btn.innerHTML="⏳ Analyzuji..."; try{ const g=parseFloat(document.getElementById("ai-g").value)||100; const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:GEMINI_PROMPT+"\n\n"+txt}]}]})}); const d=await r.json(); const raw=d.candidates[0].content.parts[0].text.replace(/```json|```/g,""); const parsed=JSON.parse(raw); addEntry({...parsed,porce_g:parsed.porce_g||g,source:"ai"}); document.getElementById("ai-input").value=""; showOk(parsed.jidlo+" přidáno"); setTimeout(closeAdd,1200); }catch(e){showErr("AI chyba: "+e.message);} btn.disabled=false; btn.innerHTML="🤖 Analyzovat přes Gemini"; }
function onAiInput(){ const inp=document.getElementById("ai-input"); const q=normKey(inp.value); if(q.length<2)return; const matches=Object.entries(FOOD_DB).filter(([k])=>k.includes(q)).slice(0,5); showSuggest(inp,matches,entry=>{ inp.value=entry[0]; hideSuggest(); document.getElementById("ai-g").value=getTypicalGrams(entry[0]); }); }

// EAN
async function handleEan(){ const code=document.getElementById("ean-inp").value.trim(); if(!code){showErr("Zadej EAN");return;} showOk("Hledám..."); try{ const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}`); const d=await r.json(); if(d.status===1){ const p=d.product,n=p.nutriments||{}; const name=p.product_name_cs||p.product_name||"Produkt"; const porce=parseFloat(p.serving_size)||100; const kcal100=parseFloat(n["energy-kcal_100g"])||0; addEntry({jidlo:name,porce_g:porce,kcal:kcal100*porce/100,b:(n.proteins_100g||0)*porce/100,s:(n.carbohydrates_100g||0)*porce/100,t:(n.fat_100g||0)*porce/100,vl:(n.fiber_100g||0)*porce/100,source:"barcode"}); showOk(name+" přidáno"); setTimeout(closeAdd,1200); }else{showErr("Nenalezeno");} }catch(e){showErr("Chyba připojení");} }

// Scanner
function openScanner(){ document.getElementById("scan-file-inp").click(); }
async function handleScanFile(inp){ const file=inp.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=async(e)=>{ const img=new Image(); img.src=e.target.result; img.onload=async()=>{ const canvas=document.createElement("canvas"); const ctx=canvas.getContext("2d"); canvas.width=img.width; canvas.height=img.height; ctx.drawImage(img,0,0); const code=await scanBarcode(canvas); if(code){ openAdd(); setMode("ean"); document.getElementById("ean-inp").value=code; handleEan(); }else{alert("Kód nerozpoznán");} }; }; reader.readAsDataURL(file); }
async function scanBarcode(canvas){ if("BarcodeDetector" in window){ const detector=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","code_128"]}); const barcodes=await detector.detect(canvas); if(barcodes.length) return barcodes[0].rawValue; } return null; }
function closeScanner(){ document.getElementById("scanner").style.display="none"; }

// Recept
let _recMatches=[];
function onRecInput(){ const inp=document.getElementById("rec-name"); const q=normKey(inp.value); if(q.length<2)return; _recMatches=Object.entries(FOOD_DB).filter(([k])=>k.includes(q)).slice(0,5).map(([,e])=>e); showSuggest(inp,_recMatches,entry=>{ inp.value=entry[0]; hideSuggest(); document.getElementById("rec-gram").value=getTypicalGrams(entry[0]); }); }
function addRecipeItem(){ const name=document.getElementById("rec-name").value.trim(); if(!name)return; const g=parseFloat(document.getElementById("rec-gram").value)||100; const found=lookupLocal(name); const entry=found||[name,0,0,0,0,0]; const r=g/100; recipe.push({id:Date.now(),j:entry[0],g,k:entry[1]*r,b:entry[2]*r,s:entry[3]*r,t:entry[4]*r}); document.getElementById("rec-name").value=""; render(); }
function removeRecipeItem(id){ recipe=recipe.filter(i=>i.id!==id); render(); }
function saveRecipe(){ const name=document.getElementById("rec-final-name").value.trim()||"Recept"; const slot=document.getElementById("rec-meal-sel").value; const tot=recipe.reduce((a,i)=>({k:a.k+i.k,b:a.b+i.b,s:a.s+i.s,t:a.t+i.t,g:a.g+i.g}),{k:0,b:0,s:0,t:0,g:0}); addEntry({...tot,jidlo:name,porce_g:Math.round(tot.g),slot,source:"recept"}); recipe=[]; setTab("dnes"); }

// Moje jídla
let editorIngredients=[],editorEditIdx=null;
function renderSavedList(){ const saved=ls("saved_foods",[]); const el=document.getElementById("saved-view-list"); if(!saved.length){el.innerHTML="<div style='text-align:center;padding:24px;color:var(--muted)'>Žádná vlastní jídla</div>";return;} el.innerHTML=saved.map((f,i)=>`<div style="background:var(--surface);border-radius:12px;padding:12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between"><div><div style="font-weight:700">${f.jidlo}</div><div style="font-size:11px;color:var(--muted)">${f.porce_g}g · ${Math.round(f.kcal)} kcal</div></div><div><button onclick="addSavedFood(${i})" style="padding:6px 12px;background:#6366f1;border:none;border-radius:8px;color:#fff">+</button><button onclick="editSavedFood(${i})" style="padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-left:6px">✏️</button><button onclick="deleteSaved(${i})" style="padding:6px 10px;background:#fef2f2;border:none;border-radius:8px;margin-left:6px;color:#ef4444">×</button></div></div></div>`).join(""); }
function addSavedFood(idx){ const saved=ls("saved_foods",[]); addEntry({...saved[idx],id:undefined}); closeAdd(); }
function deleteSaved(idx){ const saved=ls("saved_foods",[]); saved.splice(idx,1); sv("saved_foods",saved); renderSavedList(); }
function showCreateFood(){ editorIngredients=[]; editorEditIdx=null; document.getElementById("food-editor-name").value=""; renderEditorIngredients(); switchToFoodEditor(); }
function editSavedFood(idx){ const saved=ls("saved_foods",[]); const f=saved[idx]; editorEditIdx=idx; editorIngredients=f.slozky?[...f.slozky]:[{id:Date.now(),j:f.jidlo,g:f.porce_g,k:f.kcal,b:f.b,s:f.s,t:f.t}]; document.getElementById("food-editor-name").value=f.jidlo; renderEditorIngredients(); switchToFoodEditor(); }
function switchToFoodEditor(){ document.getElementById("panel-saved").style.display="none"; document.getElementById("panel-foodeditor").style.display="flex"; }
function closeEditor(){ setMode("saved"); }
function renderEditorIngredients(){ const el=document.getElementById("editor-ingredients"); if(!editorIngredients.length){el.innerHTML="";return;} el.innerHTML=editorIngredients.map(i=>`<div style="display:flex;justify-content:space-between;background:var(--surface);border-radius:10px;padding:8px;margin-bottom:4px"><div><span style="font-weight:600">${i.j}</span> <span style="color:var(--muted)">${i.g}g</span><div style="font-size:11px">${Math.round(i.k)} kcal</div></div><button onclick="removeEditorIng('${i.id}')" style="background:none;border:none;color:#ef4444">×</button></div>`).join(""); const tot=editorIngredients.reduce((a,i)=>({k:a.k+i.k}),{k:0}); document.getElementById("editor-totals").innerHTML=`${Math.round(tot.k)} kcal`; }
function removeEditorIng(id){ editorIngredients=editorIngredients.filter(i=>String(i.id)!==String(id)); renderEditorIngredients(); }
function onEditorIngInput(){ const inp=document.getElementById("editor-ing-name"); const q=normKey(inp.value); if(q.length<2)return; const matches=Object.entries(FOOD_DB).filter(([k])=>k.includes(q)).slice(0,5).map(([,e])=>e); showSuggest(inp,matches,entry=>{ inp.value=entry[0]; hideSuggest(); document.getElementById("editor-ing-g").value=getTypicalGrams(entry[0]); }); }
function addEditorIngredient(){ const name=document.getElementById("editor-ing-name").value.trim(); if(!name)return; const g=parseFloat(document.getElementById("editor-ing-g").value)||100; const found=lookupLocal(name); const entry=found||[name,0,0,0,0,0]; const r=g/100; editorIngredients.push({id:Date.now(),j:entry[0],g,k:entry[1]*r,b:entry[2]*r,s:entry[3]*r,t:entry[4]*r}); document.getElementById("editor-ing-name").value=""; renderEditorIngredients(); }
function saveFoodEditor(){ const name=document.getElementById("food-editor-name").value.trim(); if(!name){alert("Zadej název");return;} const tot=editorIngredients.reduce((a,i)=>({k:a.k+i.k,b:a.b+i.b,s:a.s+i.s,t:a.t+i.t,g:a.g+i.g}),{k:0,b:0,s:0,t:0,g:0}); const food={jidlo:name,porce_g:Math.round(tot.g),kcal:tot.k,b:tot.b,s:tot.s,t:tot.t,vl:0,source:"moje",slozky:[...editorIngredients]}; const saved=ls("saved_foods",[]); if(editorEditIdx!==null){ saved[editorEditIdx]=food; }else{ saved.push(food); } sv("saved_foods",saved); setMode("saved"); showOk("Uloženo"); }
function saveFoodEditorAndAdd(){ saveFoodEditor(); addSavedFood(editorEditIdx!==null?editorEditIdx:ls("saved_foods",[]).length-1); }

// Suggest
let _sugHide=null;
function showSuggest(input,items,onSelect){ let sug=document.getElementById("g-suggest"); if(!sug){ sug=document.createElement("div"); sug.id="g-suggest"; sug.style.cssText="position:fixed;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:10000;max-height:200px;overflow-y:auto"; document.body.appendChild(sug); } const rect=input.getBoundingClientRect(); sug.style.top=(rect.bottom+4)+"px"; sug.style.left=rect.left+"px"; sug.style.width=rect.width+"px"; sug.innerHTML=items.map(e=>`<div style="padding:10px;cursor:pointer;border-bottom:1px solid var(--border)" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''">${e[0]}<span style="float:right;color:var(--muted)">${e[1]} kcal</span></div>`).join(""); sug.style.display="block"; sug.querySelectorAll("div").forEach((div,i)=>{ div.onclick=()=>{ onSelect(items[i]); hideSuggest(); }; }); _sugHide=()=>hideSuggest(); document.addEventListener("click",_sugHide); }
function hideSuggest(){ const sug=document.getElementById("g-suggest"); if(sug)sug.style.display="none"; if(_sugHide)document.removeEventListener("click",_sugHide); }

// Service Worker registrace
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(e=>console.log("SW failed:",e));
}

// Repeat
function repeatEntry(id){ const e=entries.find(x=>x.id===id); if(e) addEntry({...e,id:undefined}); }
function repeatYesterday(idx){ const items=window._ydItems||[]; if(items[idx]) addEntry({...items[idx],id:undefined}); }

// Photo AI
let _photoBase64=null,_photoMime="image/jpeg";
function handlePhotoSelect(inp){ const file=inp.files[0]; if(!file) return; loadPhoto(file); }
function handlePhotoDrop(ev){ const file=ev.dataTransfer.files[0]; if(!file||!file.type.startsWith("image/")) return; loadPhoto(file); }
function loadPhoto(file){ _photoMime=file.type||"image/jpeg"; const reader=new FileReader(); reader.onload=e=>{ _photoBase64=e.target.result.split(",")[1]; document.getElementById("ai-photo-img").src=e.target.result; document.getElementById("ai-photo-preview").style.display="block"; document.getElementById("ai-photo-placeholder").style.display="none"; document.getElementById("ai-photo-area").style.borderColor="#6366f1"; }; reader.readAsDataURL(file); }
function clearPhoto(){ _photoBase64=null; document.getElementById("ai-photo-preview").style.display="none"; document.getElementById("ai-photo-placeholder").style.display="block"; document.getElementById("ai-photo-area").style.borderColor=""; document.getElementById("ai-photo-inp").value=""; }

// Start
if(profile.fontSize) document.documentElement.style.fontSize=profile.fontSize;
loadFoodDB().then(()=>render());
</script>
